<script>
// Функція розблокування
function unlockSite() {
    const lock = document.getElementById('sub-lock');
    lock.style.transition = 'opacity 0.5s ease';
    lock.style.opacity = '0';
    setTimeout(() => {
        lock.remove();
    }, 500);
    localStorage.setItem('isSubscribed', 'true');
}

// Автоматичне приховування, якщо вже підписаний
if (localStorage.getItem('isSubscribed') === 'true') {
    document.getElementById('sub-lock').style.display = 'none';
}
</script>
