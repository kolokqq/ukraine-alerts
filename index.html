<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми World of Tanks та Need for Speed Українською</title>
    <meta name="description" content="Офіційний сайт BlackCellUA. Прямі трансляції WOT, NFS та технічні гайди українською мовою.">
    <meta name="author" content="BlackCellUA">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --red: #ff4444; --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03); --gold: #ffcc00;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        .status-badge { padding: 6px 15px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .online { color: var(--neon); border: 1px solid var(--neon); box-shadow: 0 0 10px var(--neon); background: rgba(0, 255, 204, 0.1); }
        .offline { color: var(--red); border: 1px solid var(--red); background: rgba(255, 68, 68, 0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .online .dot { background: var(--neon); animation: pulse 1.5s infinite; }
        .offline .dot { background: var(--red); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }

        .player-viewport { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(0, 255, 204, 0.2);
            background: #020617;
        }
        
        #main-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #main-video iframe { width: 100%; height: 100%; border: none; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .game-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid transparent; transition: 0.3s; }
        .game-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        
        .shorts-container { position: relative; width: 100%; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(0,255,204,0.3); }

        .btn-donate { display: block; width: 100%; padding: 12px; background: var(--neon); color: #000; text-align: center; text-decoration: none; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; margin-top: 10px; transition: 0.3s; }
        
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
    <div id="stream-status" class="status-badge offline">
        <span class="dot"></span> <span id="status-text">НЕ В МЕРЕЖІ</span>
    </div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="main-video">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" 
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <h2 class="section-title" style="margin-top: 30px;"><i class="fa-solid fa-fire"></i> ОСТАННІ ВІДЕО ТА ГАЙДИ</h2>
        <div id="popular-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:15px;">
            <p style="color: var(--neon); opacity: 0.5;">Завантаження контенту...</p>
        </div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.9rem;"><i class="fa-solid fa-bolt" style="color: var(--gold);"></i> ТОП SHORTS</h3>
            <div class="shorts-container">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed?listType=playlist&list=UUSH29hev1ElIOHYG9oFm9dieQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem;"><i class="fa-solid fa-heart" style="color: var(--red);"></i> ПІДТРИМКА</h3>
            <a href="https://skif.donatik.ua" class="btn-donate">ДОНАТ</a>
        </div>
    </aside>
</div>

<script>
    const CID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function loadVideos() {
        const grid = document.getElementById('popular-grid');
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CID)}`);
            const data = await response.json();

            if (data.status === 'ok' && data.items.length > 0) {
                grid.innerHTML = data.items.slice(0, 12).map(v => {
                    let vId = v.link.split('v=')[1]?.split('&')[0] || v.guid.split('video:')[1];
                    return `
                        <div class="game-card" style="padding:5px;">
                            <iframe src="https://www.youtube.com/embed/${vId}" 
                                    style="width:100%; aspect-ratio:16/9; border:none; border-radius:8px;" 
                                    allowfullscreen loading="lazy"></iframe>
                            <p style="font-size:0.7rem; margin-top:5px; height:30px; overflow:hidden; color:white;">${v.title}</p>
                        </div>
                    `;
                }).join('');
                
                // Перевірка на стрім по заголовку першого відео
                const statusBadge = document.getElementById('stream-status');
                const statusText = document.getElementById('status-text');
                if (data.items[0].title.toLowerCase().includes('live')) {
                    statusBadge.className = 'status-badge online';
                    statusText.innerText = 'В ЕФІРІ';
                }
            } else {
                throw new Error('API Error');
            }
        } catch (e) {
            // ФОЛБЕК: якщо RSS не вантажиться, вставляємо плейлист каналу, щоб не було пусто
            grid.innerHTML = `
                <div style="grid-column: 1/-1; height: 450px; border: 1px solid var(--neon); border-radius: 15px; overflow: hidden;">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=UUSH29hev1ElIOHYG9oFm9dieQ" style="width:100%; height:100%; border:none;"></iframe>
                </div>`;
        }
    }

    window.onload = loadVideos;
</script>
</body>
</html>
