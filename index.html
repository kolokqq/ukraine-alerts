<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackCellUA | LIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        :root { --neon: #00ffcc; --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.4); background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* СІТКА ВІДЕО */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .v-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid transparent; transition: 0.3s; }
        .v-card:hover { border-color: var(--neon); transform: translateY(-5px); }

        .glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .btn-donate { display: block; width: 100%; padding: 12px; background: var(--neon); color: #000; text-align: center; text-decoration: none; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
    <div id="status" style="color:var(--neon); font-family:'Orbitron'; font-size:0.8rem; border:1px solid var(--neon); padding:5px 15px; border-radius:20px;">SYSTEM ONLINE</div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" allowfullscreen></iframe>
        </div>

        <h2 style="font-family:'Orbitron'; color:var(--neon); margin-top:30px; font-size:1.2rem;">ОСТАННІ ВІДЕО</h2>
        <div id="popular-grid" class="video-grid">
            </div>
    </div>

    <aside>
        <div class="glass-panel">
            <h3 style="font-family:'Orbitron'; color:var(--neon); font-size:0.9rem;">SHORTS</h3>
            <iframe src="https://www.youtube.com/embed/videoseries?list=UUSH29hev1ElIOHYG9oFm9dieQ" style="width:100%; aspect-ratio:9/16; border-radius:10px;"></iframe>
        </div>
        <div class="glass-panel">
            <p style="font-size:0.8rem;">Xeon E3-1240 | GTX 1050 Ti</p>
            <a href="https://skif.donatik.ua" class="btn-donate">ДОНАТ</a>
        </div>
    </aside>
</div>

<script>
    const CID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function loadContent() {
        const grid = document.getElementById('popular-grid');
        const t = Date.now();
        // Беремо RSS, щоб витягнути список відео для сітки
        const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CID)}&t=${t}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                // Виводимо 12 останніх відео в сітку (вони не заважають плеєру зверху)
                grid.innerHTML = data.items.map(v => {
                    const id = v.guid.split(':')[2] || v.link.split('v=')[1];
                    return `
                        <div class="v-card">
                            <iframe src="https://www.youtube.com/embed/${id}" loading="lazy" allowfullscreen style="width:100%; aspect-ratio:16/9; border-radius:5px;"></iframe>
                            <p style="font-size:0.7rem; margin-top:8px; height:32px; overflow:hidden;">${v.title}</p>
                        </div>`;
                }).join('');
            }
        } catch (e) {
            // Якщо RSS впав, ставимо запасну сітку-плейлист
            grid.innerHTML = `<iframe src="https://www.youtube.com/embed/videoseries?list=UULP29hev1ElIOHYG9oFm9dieQ" style="grid-column:1/-1; width:100%; height:400px; border-radius:10px;"></iframe>`;
        }
    }
    window.onload = loadContent;
</script>
</body>
</html>
