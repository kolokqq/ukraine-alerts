<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackCellUA | Official Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Exo+2:wght@700;900&display=swap');

        :root {
            --neon: #00ffcc;
            --danger: #ff0044;
            --accent: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            /* ТВОЯ КАРТИНКА НА ФОНІ */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('storage/vehicles/1/3649/preview.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        .header {
            width: 100%;
            padding: 20px 0;
            background: rgba(0,0,0,0.9);
            border-bottom: 3px solid var(--neon);
            text-align: center;
            box-shadow: 0 0 20px rgba(0,255,204,0.3);
        }

        .logo {
            font-family: 'Orbitron';
            font-size: 2.5rem;
            letter-spacing: 7px;
            text-shadow: 0 0 15px var(--neon);
        }

        /* MAIN CONTENT */
        .content {
            max-width: 1000px;
            width: 90%;
            margin: 40px 0;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,255,204,0.2);
            border-radius: 20px;
            padding: 30px;
        }

        /* PLAYER */
        .stream-container {
            position: relative;
            border: 2px solid var(--neon);
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }

        /* BUTTONS */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 20px;
            font-family: 'Orbitron';
            text-decoration: none;
            text-align: center;
            font-weight: 900;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-sub { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); border: none; }
        .btn-sub:hover { transform: scale(1.05); filter: brightness(1.2); }

        .btn-donat { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-donat:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        /* REAL WORKING PROGRESS BAR */
        .progress-section {
            margin-top: 40px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }

        .bar-container {
            height: 35px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }

        #myBar {
            height: 100%;
            width: 0%; /* Початкове значення для анімації */
            background: linear-gradient(90deg, var(--danger), var(--neon));
            box-shadow: 0 0 15px var(--neon);
            transition: width 2s ease-in-out;
        }

        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 900;
            font-family: 'Orbitron';
            font-size: 1.1rem;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BLACKCELLUA</div>
    </div>

    <div class="content">
        <div class="stream-container">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
        </div>

        <div class="btn-grid">
            <a href="https://www.youtube.com/@BlackCellUA?sub_confirmation=1" class="btn btn-sub">ПІДПИСАТИСЬ</a>
            <a href="https://frames2.payhub.com.ua/moneybox?box_id=589cbce5-320d-4d3c-9abc-c4d388138564" class="btn btn-donat">ПІДТРИМАТИ</a>
        </div>

        <div class="progress-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-family: 'Orbitron';">
                <span>ЦІЛЬ: 200 SUBS</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="bar-container">
                <div id="myBar"></div>
                <div class="bar-text"><span id="current-subs">193</span> / 200</div>
            </div>
        </div>
    </div>

    <script>
        // РЕАЛЬНИЙ СКРИПТ РОБОТИ САЙТУ
        window.onload = function() {
            // 1. Анімація прогрес-бару при завантаженні
            const currentSubs = 193;
            const targetSubs = 200;
            const percentage = (currentSubs / targetSubs) * 100;
            
            setTimeout(() => {
                document.getElementById('myBar').style.width = percentage + '%';
                document.getElementById('percent-text').innerText = percentage.toFixed(1) + '%';
            }, 500);

            // 2. Імітація перевірки стріму
            console.log("BlackCellUA Engine Started...");
        };
    </script>

</body>
</html>
