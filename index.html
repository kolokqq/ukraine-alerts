<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | World of Tanks</title>
    <meta name="description" content="Ігровий портал BlackCellUA 🔥. Дивись прямі трансляції WOT українською.">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks UA, WOT стрім, танки українською">
    <meta name="author" content="BlackCellUA">
    <link rel="canonical" href="https://blackcellua.pp.ua/">
    <meta property="og:url" content="https://blackcellua.pp.ua/">
    <meta property="og:title" content="BlackCellUA 🔥 — Твій ігровий портал">
    <meta property="og:description" content="Прямі ефіри World of Tanks та шлях до трьох позначок.">
    <meta property="og:image" content="https://i.ibb.co/3s6C7fG/image-3.png">
    <meta property="og:type" content="website">

    <link rel="shortcut icon" href="favicon_v2.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; 
            --bg: #020617; 
            --panel: rgba(255,255,255,0.03);
            --text: #ffffff; 
            --radius-lg: 20px; 
            --radius-sm: 12px;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; transition: 0.3s; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 15px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        
        /* Плеєр */
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.3); background: #000; }
        .live-status-tag { position: absolute; top: 20px; left: 20px; z-index: 10; padding: 6px 15px; border-radius: 30px; font-family: 'Orbitron'; font-size: 0.7rem; background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); }
        .is-live { border-color: #ff0000; color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .is-live .dot { background: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        iframe { width: 100%; height: 100%; border: none; }
        
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 0.9rem; margin: 30px 0 20px; display: flex; align-items: center; gap: 12px; text-transform: uppercase; }
        
        /* Картки відео з назвами в рамках */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .v-card { background: var(--panel); padding: 12px; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .v-card:hover { border-color: var(--neon); background: rgba(0, 255, 204, 0.05); }
        .v-card iframe { border-radius: var(--radius-sm); margin-bottom: 10px; }
        .v-title-box { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; border-left: 3px solid var(--neon); font-size: 0.75rem; font-weight: 600; text-align: left; line-height: 1.3; }
        
        /* Панелі */
        .glass-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .don-link, .soc-btn { border-radius: var(--radius-sm); transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; text-decoration: none; color: white; }
        .don-link { gap: 15px; padding: 15px; background: rgba(255,255,255,0.03); margin-bottom: 10px; }
        .don-link:hover { border-color: var(--neon); background: rgba(0, 255, 204, 0.1); }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .soc-btn { justify-content: center; gap: 8px; padding: 12px; background: rgba(255,255,255,0.05); font-size: 0.8rem; }
        .soc-btn:hover { background: var(--neon); color: #000; }

        .progress-track { background: rgba(255,255,255,0.1); height: 10px; border-radius: 20px; overflow: hidden; margin-top: 8px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #008f7a, var(--neon)); box-shadow: 0 0 10px var(--neon); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">BLACKCELLUA 🔥</a>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="live-indicator" class="live-status-tag">
                <div class="dot"></div><span id="status-text">ОФЛАЙН</span>
            </div>
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> ОСОБЛИВЕ ВІДЕО</h2>
        <div id="grid-special" class="grid-container">Завантаження...</div>

        <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> ОСТАННІ ТРАНСЛЯЦІЇ</h2>
        <div id="grid-recent" class="grid-container">Завантаження...</div>
    </div>

    <aside>
        <div class="glass-panel" style="border-left: 4px solid var(--neon);">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-calendar-day"></i> РОЗКЛАД</h3>
            <div style="font-size: 0.8rem;">
                <p>ПН - ПТ: 19:00 - 23:00</p>
                <p>СБ - НД: Гнучкий графік</p>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-bolt"></i> TOP SHORTS</h3>
            <div style="width:100%; aspect-ratio:9/16; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--neon);">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs" allowfullscreen></iframe>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-crosshairs"></i> ЦІЛЬ: 3 ВІДМІТКИ</h3>
            <div style="margin-bottom: 15px;">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem;"><span>Об'єкт 277</span><b>92.4%</b></div>
                <div class="progress-track"><div class="progress-bar" style="width: 92.4%;"></div></div>
            </div>
        </div>

        <div class="glass-panel" style="border: 1px solid var(--neon);">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-wallet"></i> ПІДТРИМКА</h3>
            <div class="don-link" style="cursor:pointer;" onclick="navigator.clipboard.writeText('5168745035521035');alert('Скопійовано!')">
                <i class="fa-solid fa-credit-card"></i>
                <div><small>ПРИВАТ 24</small><br><b>5168 7450 3552 1035</b></div>
            </div>
            <a href="https://donatello.to/krakenua" target="_blank" class="don-link">
                <i class="fa-solid fa-heart"></i><b>DONATELLO</b>
            </a>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-users"></i> СПІЛЬНОТА</h3>
            <div class="social-grid">
                <a href="https://discord.gg/cdyRSHqD" target="_blank" class="soc-btn"><i class="fa-brands fa-discord"></i> Discord</a>
                <a href="https://www.youtube.com/@BlackCellUA" target="_blank" class="soc-btn"><i class="fa-brands fa-youtube"></i> YouTube</a>
            </div>
        </div>
    </aside>
</div>

<script>
    async function fetchFeed(url, elementId, limit) {
        const grid = document.getElementById(elementId);
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.status === 'ok') {
                let html = '';
                data.items.slice(0, limit).forEach(item => {
                    let vId = item.link.split('v=')[1]?.split('&')[0] || item.link.split('/').pop();
                    html += `
                    <div class="v-card">
                        <iframe src="https://www.youtube.com/embed/${vId}" style="width:100%; aspect-ratio:16/9;"></iframe>
                        <div class="v-title-box">${item.title}</div>
                    </div>`;
                });
                grid.innerHTML = html;
                return data.items[0];
            }
        } catch (e) { grid.innerHTML = "Помилка завантаження..."; }
    }

    async function updateAll() {
        const last = await fetchFeed('https://rss.app/feeds/2IWHE7GWK0ut65vc.xml', 'grid-recent', 6);
        await fetchFeed('https://rss.app/feeds/h7valG7dUSvQGIAh.xml', 'grid-special', 3);
        if (last) {
            const isLive = last.title.toLowerCase().includes('live') || last.title.toLowerCase().includes('стрім');
            document.getElementById('live-indicator').className = isLive ? 'live-status-tag is-live' : 'live-status-tag';
            document.getElementById('status-text').innerText = isLive ? 'LIVE' : 'ОФЛАЙН';
        }
    }
    window.onload = updateAll;
</script>
</body>
</html>
