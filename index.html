    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; 
            --bg: #020617; 
            --panel: rgba(255,255,255,0.03);
            --text: #ffffff; 
            --radius-lg: 20px; 
            --radius-sm: 12px;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 15px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        
        /* Основний плеєр */
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.3); background: #000; margin-bottom: 15px; }
        
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 0.9rem; margin: 30px 0 20px; display: flex; align-items: center; gap: 12px; text-transform: uppercase; }
        
        /* СІТКА ВІДЕО ТА РАМКИ НАЗВ */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .v-card { background: var(--panel); padding: 12px; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; display: flex; flex-direction: column; }
        .v-card:hover { border-color: var(--neon); background: rgba(0, 255, 204, 0.05); transform: translateY(-3px); }
        .v-card iframe { border-radius: var(--radius-sm); width: 100%; aspect-ratio: 16/9; margin-bottom: 12px; }
        
        /* ТА САМА РАМКА ДЛЯ НАЗВИ */
        .v-title-box { 
            background: rgba(0, 255, 204, 0.07); 
            padding: 10px 15px; 
            border-radius: 10px; 
            border-left: 4px solid var(--neon); 
            font-size: 0.75rem; 
            font-weight: 600; 
            color: #fff;
            line-height: 1.4;
        }
        
        /* Бічна панель */
        .glass-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .don-link, .soc-btn { border-radius: var(--radius-sm); transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; text-decoration: none; color: white; }
        .don-link { gap: 15px; padding: 15px; background: rgba(255,255,255,0.03); margin-bottom: 10px; }
        .don-link:hover { border-color: var(--neon); background: rgba(0, 255, 204, 0.1); }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .soc-btn { justify-content: center; gap: 8px; padding: 12px; background: rgba(255,255,255,0.05); font-size: 0.8rem; }
        .soc-btn:hover { background: var(--neon); color: #000; }

        .progress-track { background: rgba(255,255,255,0.1); height: 10px; border-radius: 20px; overflow: hidden; margin-top: 8px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #008f7a, var(--neon)); box-shadow: 0 0 10px var(--neon); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
