<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Головний ігровий портал</title>
    <meta name="description" content="Дивись стріми BlackCellUA на весь екран. World of Tanks, NFS та гайди українською.">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --red: #ff4444; --bg: #020617; 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03); 
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        .status-badge { padding: 6px 15px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; border: 1px solid var(--red); color: var(--red); }
        .online { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .online .dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ВЕЛИКИЙ ПЛЕЄР НА ВЕСЬ ЕКРАН */
        .hero-section {
            width: 100%;
            background: #000;
            border-bottom: 2px solid var(--neon);
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.1);
        }

        .hero-player-container {
            max-width: 1920px; /* Максимальна ширина для 4K */
            margin: 0 auto;
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        .hero-player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* КОНТЕНТ ПІД ПЛЕЄРОМ */
        .main-layout { 
            display: grid; 
            grid-template-columns: 1fr 320px; 
            gap: 25px; 
            max-width: 1600px; 
            margin: 30px auto; 
            padding: 0 15px; 
        }

        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* СІТКА ВІДЕО ТА ВИПРАВЛЕННЯ НАЗВ */
        #popular-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .game-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--neon); }
        .game-card iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; margin-bottom: 12px; border: none; }
        .game-card p { font-size: 0.85rem; margin: 0; line-height: 1.4; color: #fff; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* САЙДБАР ТА ШОРТСИ */
        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .shorts-wrapper { width: 100%; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; border: 2px solid var(--neon); background: #000; position: relative; }
        .shorts-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        footer { background: rgba(0,0,0,0.9); padding: 30px; text-align: center; border-top: 1px solid rgba(0, 255, 204, 0.2); margin-top: 50px; }
        
        @media (max-width: 1000px) { 
            .main-layout { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
    <div id="stream-status" class="status-badge offline">
        <span class="dot"></span> <span id="status-text">OFFLINE</span>
    </div>
</nav>

<section class="hero-section">
    <div class="hero-player-container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" allowfullscreen></iframe>
    </div>
</section>

<div class="main-layout">
    <div class="content">
        <h2 class="section-title"><i class="fa-solid fa-video"></i> ОСТАННІ ВІДЕО ТА ГАЙДИ</h2>
        <div id="popular-grid">Завантаження...</div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 class="section-title"><i class="fa-solid fa-bolt"></i> SHORTS</h3>
            <div class="shorts-wrapper">
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUSH29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title"><i class="fa-solid fa-microchip"></i> ЗАЛІЗО</h3>
            <div style="font-size: 0.85rem; line-height: 1.8;">
                <div>CPU: Xeon E3-1240</div>
                <div>GPU: GTX 1050 Ti</div>
                <div>RAM: 16GB</div>
            </div>
        </div>
    </aside>
</div>

<footer>
    <div style="font-family: 'Orbitron'; font-size: 0.8rem; color: rgba(255,255,255,0.5);">© 2026 BlackCellUA. Стріми українською.</div>
</footer>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function loadContent() {
        const grid = document.getElementById('popular-grid');
        const badge = document.getElementById('stream-status');
        const statusText = document.getElementById('status-text');

        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}`);
            const data = await res.json();
            
            if (data.status === 'ok') {
                grid.innerHTML = data.items.slice(0, 12).map(v => `
                    <div class="game-card">
                        <iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" loading="lazy"></iframe>
                        <p title="${v.title}">${v.title}</p>
                    </div>
                `).join('');

                const isLive = data.items[0].title.toLowerCase().includes('live') || data.items[0].title.toLowerCase().includes('стрім');
                if (isLive) {
                    badge.className = 'status-badge online';
                    statusText.innerText = 'В ЕФІРІ';
                }
            }
        } catch (e) { console.error(e); }
    }
    loadContent();
</script>
</body>
</html>
