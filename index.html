<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми World of Tanks та Need for Speed Українською</title>
    <meta name="description" content="Офіційний сайт BlackCellUA - https://social-up.pp.ua. Прямі трансляції WOT, NFS та технічні гайди українською мовою. Дивись стріми, Shorts та найкращі моменти!">
    <meta name="keywords" content="BlackCellUA, social-up.pp.ua, стрім українською, World of Tanks, WOT UA, NFS стрім, ігри українською, Xeon E3-1240, GTX 1050 Ti">
    <meta name="author" content="BlackCellUA (https://social-up.pp.ua)">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --red: #ff4444; --bg: #020617; 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03); --gold: #ffcc00;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        .status-badge { padding: 6px 15px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .online { color: var(--neon); border: 1px solid var(--neon); box-shadow: 0 0 10px var(--neon); }
        .offline { color: var(--red); border: 1px solid var(--red); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .online .dot { animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }

        .player-viewport { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: 15px; overflow: hidden; border: 1px solid rgba(0, 255, 204, 0.2);
            background: #000;
        }
        
        .offline-placeholder {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://social-up.pp.ua/your_image.png') center/cover no-repeat;
            z-index: 2; display: flex; align-items: center; justify-content: center;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        #popular-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 15px; margin-bottom: 30px; 
        }

        .game-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; border: 1px solid transparent; transition: 0.3s; }
        .game-card:hover { border-color: var(--neon); transform: translateY(-3px); }
        .game-card p { font-size: 0.75rem; margin-top: 8px; height: 32px; overflow: hidden; }
        
        .shorts-container { width: 100%; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; border: 2px solid var(--neon); }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .spec-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
    <div id="stream-status" class="status-badge offline">
        <span class="dot"></span> <span id="status-text">НЕ В МЕРЕЖІ</span>
    </div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="offline-img" class="offline-placeholder"></div>
            <iframe id="main-iframe" src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" allowfullscreen></iframe>
        </div>

        <h2 class="section-title" style="margin-top:30px;"><i class="fa-solid fa-video"></i> ОСТАННІ ВІДЕО ТА ГАЙДИ</h2>
        <div id="popular-grid"></div>

        <div class="info-grid">
            <div class="glass-panel">
                <h3 class="section-title"><i class="fa-solid fa-gamepad"></i> ІГРИ</h3>
                <p>World of Tanks</p>
                <p>Need For Speed</p>
            </div>
            <div class="glass-panel">
                <h3 class="section-title"><i class="fa-solid fa-microchip"></i> ЗАЛІЗО</h3>
                <div class="spec-item"><span>CPU:</span> <span>Xeon E3-1240</span></div>
                <div class="spec-item"><span>GPU:</span> <span>GTX 1050 Ti</span></div>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 class="section-title"><i class="fa-solid fa-bolt"></i> SHORTS</h3>
            <div class="shorts-container">
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUSH29hev1ElIOHYG9oFm9dieQ"></iframe>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title">СОЦМЕРЕЖІ</h3>
            <a href="https://t.me/blackcellua" style="color:var(--neon); text-decoration:none; display:block; margin-bottom:10px;"><i class="fa-brands fa-telegram"></i> Telegram</a>
            <a href="https://social-up.pp.ua" style="color:var(--neon); text-decoration:none; display:block;"><i class="fa-solid fa-globe"></i> Website</a>
        </div>
    </aside>
</div>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function updateLayout() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}`);
            const data = await res.json();
            
            if (data.status === 'ok') {
                // Відео (25 плиток)
                document.getElementById('popular-grid').innerHTML = data.items.slice(0, 25).map(v => `
                    <div class="game-card">
                        <iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" loading="lazy"></iframe>
                        <p>${v.title}</p>
                    </div>
                `).join('');

                // Статус стріму
                const isLive = data.items[0].title.toLowerCase().includes('live');
                const badge = document.getElementById('stream-status');
                const placeholder = document.getElementById('offline-img');

                if (isLive) {
                    badge.className = 'status-badge online';
                    document.getElementById('status-text').innerText = 'В ЕФІРІ';
                    placeholder.style.display = 'none';
                } else {
                    badge.className = 'status-badge offline';
                    document.getElementById('status-text').innerText = 'НЕ В МЕРЕЖІ';
                    placeholder.style.display = 'flex';
                }
            }
        } catch (e) { console.error("Error loading data"); }
    }

    updateLayout();
    setInterval(updateLayout, 60000);
</script>
</body>
</html>
