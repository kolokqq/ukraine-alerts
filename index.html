    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --red: #ff4444; --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03); --gold: #ffcc00;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        .status-badge { padding: 6px 15px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .online { color: var(--neon); border: 1px solid var(--neon); box-shadow: 0 0 10px var(--neon); background: rgba(0, 255, 204, 0.1); }
        .offline { color: var(--red); border: 1px solid var(--red); background: rgba(255, 68, 68, 0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .online .dot { background: var(--neon); animation: pulse 1.5s infinite; }
        .offline .dot { background: var(--red); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }

        .player-viewport { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(0, 255, 204, 0.2);
            background: #000;
        }
        
        #main-video iframe { width: 100%; height: 100%; border: none; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* ВІДЕО КАРТКИ */
        .v-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; border: 1px solid transparent; transition: 0.3s; }
        .v-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        
        .shorts-container { position: relative; width: 100%; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(0,255,204,0.3); }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
        .spec-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .spec-label { color: var(--neon); font-weight: bold; }

        .btn-donate { display: block; width: 100%; padding: 12px; background: var(--neon); color: #000; text-align: center; text-decoration: none; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; margin-top: 10px; transition: 0.3s; }
        .btn-donate:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--neon); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>

</nav>

<div class="main-layout">

            <div id="main-video">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" 
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> ОСТАННІ ПОДІЇ ТА СТРІМИ</h2>
        <div id="popular-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:15px;">
            </div>

        <div class="info-grid">
            <div class="glass-panel">
                <h3 class="section-title"><i class="fa-solid fa-gamepad"></i> ОСНОВНІ ІГРИ</h3>

                    <div class="v-card" style="text-align: center;">
                        <i class="fa-solid fa-shield-tank" style="font-size: 2rem; color: var(--neon);"></i>

                    </div>
                    <div class="v-card" style="text-align: center;">
                        <i class="fa-solid fa-car-side" style="font-size: 2rem; color: var(--neon);"></i>
                        <p style="font-size: 0.8rem; margin-top: 5px;">Need For Speed</p>
                    </div>
                </div>
            </div>

            <div class="glass-panel">
                <h3 class="section-title"><i class="fa-solid fa-microchip"></i> SETUP</h3>
                <div class="spec-item"><span class="spec-label">Процесор:</span> <span>Intel Xeon E3-1240</span></div>
                <div class="spec-item"><span class="spec-label">Відеокарта:</span> <span>GTX 1050 Ti</span></div>
                <div class="spec-item"><span class="spec-label">ОЗП:</span> <span>16GB DDR3</span></div>
                <div class="spec-item"><span class="spec-label">Кодування:</span> <span>NVENC</span></div>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.9rem;"><i class="fa-solid fa-bolt" style="color: var(--gold);"></i> ТОП SHORTS</h3>
            <div class="shorts-container">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=UUSH29hev1ElIOHYG9oFm9dieQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem;">🔗 СОЦМЕРЕЖІ</h3>
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
                <a href="https://t.me/blackcellua" target="_blank" style="text-align:center; color:#fff; text-decoration:none;"><i class="fa-brands fa-telegram" style="font-size:1.5rem; color:var(--neon);"></i><br><span style="font-size:0.6rem;">TG</span></a>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function checkStreamStatus() {
        try {
            // Прямий RSS YouTube для статусу
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}&t=${Date.now()}`);
            const data = await response.json();
            const statusBadge = document.getElementById('stream-status');
            const statusText = document.getElementById('status-text');

            if (data.status === 'ok' && data.items.length > 0) {
                const lastItem = data.items[0];
                // Перевірка на "LIVE" у заголовку або посиланні
                if (lastItem.title.toLowerCase().includes('live') || lastItem.link.includes('live')) {
                    statusBadge.className = 'status-badge online';
                    statusText.innerText = 'В ЕФІРІ';
                } else {
                    statusBadge.className = 'status-badge offline';
                    statusText.innerText = 'НЕ В МЕРЕЖІ';
                }
            }
        } catch (e) { console.log('Status error'); }
    }

    async function loadVideos() {
        const grid = document.getElementById('popular-grid');
        const RSS = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}&t=${Date.now()}`;
        
        try {
            const res = await fetch(RSS);
            const data = await res.json();
            if (data.status === 'ok') {
                grid.innerHTML = data.items.map(v => {
                    const id = v.link.split('v=')[1];
                    return `
                        <div class="v-card">
                            <iframe src="https://www.youtube.com/embed/${id}" style="width:100%; aspect-ratio:16/9; border:none; border-radius:8px;" loading="lazy" allowfullscreen></iframe>
                            <p style="font-size:0.75rem; margin-top:8px; height:32px; overflow:hidden; font-weight:bold;">${v.title}</p>
                        </div>
                    `;
                }).join('');
            }
        } catch (e) {
            // Бекап, якщо RSS не спрацював
            grid.innerHTML = `<iframe src="https://www.youtube.com/embed/videoseries?list=UULP29hev1ElIOHYG9oFm9dieQ" style="width:100%; height:400px; border-radius:15px; grid-column:1/-1;"></iframe>`;
        }
    }

    window.onload = () => {
        loadVideos();
        checkStreamStatus();
        setInterval(checkStreamStatus, 5000); // Оновлення статусу щохвилини
    };
</script>
