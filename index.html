<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми та Гайди</title>
    <meta name="description" content="Офіційний сайт BlackCellUA - https://social-up.pp.ua. Стріми World of Tanks та NFS українською. Поради щодо заліза та налаштування OBS.">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks, NFS, ігровий портал, Xeon E3-1240, GTX 1050 Ti">
    <meta name="author" content="BlackCellUA">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { --neon: #00ffcc; --red: #ff4444; --bg: #020617; --text: #ffffff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        /* СТАТУС ТА ЛІЧИЛЬНИК */
        .status-container { display: flex; align-items: center; gap: 15px; }
        .status-badge { padding: 6px 15px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; border: 1px solid var(--red); color: var(--red); transition: 0.3s; }
        .online { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .online .dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .viewer-count { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon); display: none; align-items: center; gap: 6px; background: rgba(0, 255, 204, 0.15); padding: 5px 12px; border-radius: 12px; border: 1px solid rgba(0, 255, 204, 0.3); }
        .is-live .viewer-count { display: flex; }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; max-width: 1400px; margin: 20px auto; padding: 0 15px; flex-grow: 1; }
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0, 255, 204, 0.2); background: #000; }
        
        /* ВІДЕО-СІТКА: ВИПРАВЛЕНО НАКЛАДАННЯ */
        #popular-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; margin-top: 20px; }
        .game-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; transition: 0.3s; display: flex; flex-direction: column; height: auto; }
        .game-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .game-card iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; margin-bottom: 15px; border: none; }
        .game-card p { font-size: 0.85rem; margin: 0; line-height: 1.4; color: #fff; font-weight: 500; min-height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .shorts-container { width: 100%; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; border: 1px solid var(--neon); }
        .spec-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }

        /* ФУТЕР З АВТОРСЬКИМИ ПРАВАМИ */
        footer { background: rgba(0,0,0,0.9); padding: 25px; text-align: center; border-top: 1px solid rgba(0, 255, 204, 0.2); margin-top: 50px; }
        .copyright { font-family: 'Orbitron'; font-size: 0.8rem; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
        .copyright span { color: var(--neon); text-shadow: 0 0 5px var(--neon); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
    <div id="status-wrapper" class="status-container">
        <div id="stream-status" class="status-badge">
            <span class="dot"></span> <span id="status-text">OFFLINE</span>
        </div>
        <div class="viewer-count">
            <i class="fa-solid fa-eye"></i> <span id="live-viewers">0</span>
        </div>
    </div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <iframe id="main-frame" src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" allowfullscreen></iframe>
        </div>
        <h2 class="section-title" style="margin-top:30px;"><i class="fa-solid fa-video"></i> ОСТАННІ ВІДЕО ТА ГАЙДИ</h2>
        <div id="popular-grid">Оновлення даних...</div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 class="section-title"><i class="fa-solid fa-bolt"></i> ТЕПЕР В ЕФІРІ</h3>
            <div class="shorts-container">
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUSH29hev1ElIOHYG9oFm9dieQ"></iframe>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title"><i class="fa-solid fa-gamepad"></i> МОЇ ІГРИ</h3>
            <div class="spec-item"><span>World of Tanks</span> <i class="fa-solid fa-shield-tank"></i></div>
            <div class="spec-item"><span>Need For Speed</span> <i class="fa-solid fa-car"></i></div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title"><i class="fa-solid fa-microchip"></i> ЗАЛІЗО</h3>
            <div class="spec-item"><span>CPU:</span> <span>Xeon E3-1240</span></div>
            <div class="spec-item"><span>GPU:</span> <span>GTX 1050 Ti</span></div>
        </div>
    </aside>
</div>

<footer>
    <div class="copyright">
        © 2026 <span>BlackCellUA</span>. Всі права захищені.
        <br><small style="font-size: 0.6rem; opacity: 0.5;">Створено для українських геймерів</small>
    </div>
</footer>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function loadContent() {
        const grid = document.getElementById('popular-grid');
        const badge = document.getElementById('stream-status');
        const wrapper = document.getElementById('status-wrapper');
        const statusText = document.getElementById('status-text');
        const viewers = document.getElementById('live-viewers');

        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}`);
            const data = await res.json();
            
            if (data.status === 'ok') {
                // Виводимо відео без накладання назв
                grid.innerHTML = data.items.slice(0, 15).map(v => `
                    <div class="game-card">
                        <iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" loading="lazy"></iframe>
                        <p>${v.title}</p>
                    </div>
                `).join('');

                // Логіка онлайну: шукаємо стрім
                const firstVideo = data.items[0].title.toLowerCase();
                if (firstVideo.includes('live') || firstVideo.includes('стрім')) {
                    badge.classList.add('online');
                    wrapper.classList.add('is-live');
                    statusText.innerText = 'В ЕФІРІ';
                    // Симуляція онлайну (якщо немає API Key)
                    viewers.innerText = Math.floor(Math.random() * 30) + 5;
                } else {
                    badge.classList.remove('online');
                    wrapper.classList.remove('is-live');
                    statusText.innerText = 'OFFLINE';
                }
            }
        } catch (e) {
            grid.innerHTML = "Не вдалося завантажити відео.";
        }
    }

    loadContent();
    setInterval(loadContent, 240000); // Оновлення раз на 4 хвилини
</script>
</body>
</html>
