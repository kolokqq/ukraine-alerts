<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | World of Tanks</title>
    <meta name="description" content="Ігровий портал BlackCellUA 🔥. Дивись прямі трансляції WOT українською.">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks UA, WOT стрім, танки українською">
    <meta name="author" content="BlackCellUA">
    
    <link rel="canonical" href="https://blackcellua.pp.ua/">

    <meta property="og:url" content="https://blackcellua.pp.ua/">
    <meta property="og:title" content="BlackCellUA 🔥 — Твій ігровий портал">
    <meta property="og:description" content="Прямі ефіри World of Tanks та шлях до трьох позначок.">
    <meta property="og:image" content="https://i.ibb.co/3s6C7fG/image-3.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="shortcut icon" href="favicon_v2.ico" type="image/x-icon">
    <link rel="icon" href="favicon_32_v2.png" sizes="32x32">
    <link rel="icon" href="favicon_48_v2.png" sizes="48x48">
    <link rel="icon" href="favicon_96_v2.png" sizes="96x96">
    <link rel="icon" href="favicon_144_v2.png" sizes="144x144">
    <link rel="apple-touch-icon" href="favicon_144_v2.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        :root { --neon: #00ffcc; --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); --text: #ffffff; }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.4); background: #000; }
        
        iframe { width: 100%; height: 100%; border: none; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1rem; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
        
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .v-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(0,255,204,0.1); }
        .glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .btn-donate { display: block; width: 100%; padding: 12px; background: var(--neon); color: #000; text-align: center; text-decoration: none; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; box-sizing: border-box; }

        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="https://blackcellua.pp.ua/" class="logo">BlackCellUA | WOT 🔥</a>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> ОСТАННІ ВІДЕО</h2>
        <div id="video-grid">
            <div class="v-card">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs" allowfullscreen style="width:100%; aspect-ratio:16/9; border-radius:8px;"></iframe>
                <p style="font-size:0.75rem; margin-top:10px; font-weight:bold; color:var(--neon);">Останній стрім / Відео</p>
            </div>
            <div class="v-card">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs" allowfullscreen style="width:100%; aspect-ratio:16/9; border-radius:8px;"></iframe>
                <p style="font-size:0.75rem; margin-top:10px; font-weight:bold; color:var(--neon);">World of Tanks UA</p>
            </div>
        </div>
    </div>

    <aside>
        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem; margin-top:0;"><i class="fa-solid fa-bolt"></i> SHORTS</h3>
            <div style="width:100%; aspect-ratio:9/16; border-radius:12px; overflow:hidden; border:1px solid var(--neon);">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs" allowfullscreen></iframe>
            </div>
        </div>
        <div class="glass-panel">
            <a href="https://skif.donatik.ua" target="_blank" class="btn-donate">ПІДТРИМАТИ</a>
        </div>
    </aside>
</div>

</body>
</html>
