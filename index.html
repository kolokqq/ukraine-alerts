<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми World of Tanks та Need for Speed Українською</title>
    <meta name="description" content="Офіційний сайт BlackCellUA. Прямі трансляції WOT, NFS та технічні гайди українською мовою. Дивись стріми, Shorts та найкращі моменти!">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks, NFS, Xeon E3-1240, GTX 1050 Ti">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03);
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon); }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }

        /* ГОЛОВНИЙ ФІКС: БАНЕР ЯК ПІДКЛАДКА */
        .player-viewport { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(0, 255, 204, 0.2);
            /* Твоя картинка */
            background: #020617 url('your_image.png') center/cover no-repeat;
        }
        
        /* Плеєр завантажується "невидимим" шаром */
        #main-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #main-video iframe { width: 100%; height: 100%; border: none; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .shorts-wrapper { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid var(--neon); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="main-video">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" 
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <h2 style="font-family:'Orbitron'; color:var(--neon); font-size:1.1rem; margin:25px 0 15px;">⚡ ОСТАННІ ВІДЕО</h2>
        <div id="popular-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:15px;"></div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 style="font-family:'Orbitron'; font-size:0.8rem; color:var(--neon);">🔗 СОЦМЕРЕЖІ</h3>
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:15px;">
                <a href="https://t.me/blackcellua" target="_blank" style="text-align:center; color:#fff; text-decoration:none;"><i class="fa-brands fa-telegram" style="font-size:1.5rem; color:var(--neon);"></i><br><span style="font-size:0.6rem;">TG</span></a>
                <a href="https://www.youtube.com/@BlackCellUA" target="_blank" style="text-align:center; color:#fff; text-decoration:none;"><i class="fa-brands fa-youtube" style="font-size:1.5rem; color:var(--neon);"></i><br><span style="font-size:0.6rem;">YT</span></a>
                <a href="#" style="text-align:center; color:#fff; text-decoration:none;"><i class="fa-solid fa-globe" style="font-size:1.5rem; color:var(--neon);"></i><br><span style="font-size:0.6rem;">WEB</span></a>
            </div>
        </div>

        <div class="glass-panel" style="margin-top:20px;">
            <h3 style="font-family:'Orbitron'; font-size:0.8rem; color:#ffcc00; margin-bottom:15px;">⚡ ТОП SHORTS</h3>
            <div class="shorts-wrapper">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
            </div>
        </div>
    </aside>
</div>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';
    async function loadVideos() {
        const RSS = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}`;
        try {
            const res = await fetch(RSS);
            const data = await res.json();
            if (data.status === 'ok') {
                document.getElementById('popular-grid').innerHTML = data.items.slice(0, 4).map(v => `
                    <div style="background:var(--glass); padding:10px; border-radius:10px;">
                        <iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" style="width:100%; aspect-ratio:16/9; border:none; border-radius:5px;" loading="lazy"></iframe>
                    </div>
                `).join('');
            }
        } catch (e) {}
    }
    window.onload = loadVideos;
</script>
</body>
</html>
