<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми World of Tanks та NFS 🔥</title>
    <meta name="description" content="Ігровий портал BlackCellUA. Стріми WOT та NFS українською.">
    <meta name="keywords" content="BlackCellUA, стрім українською, WOT UA, NFS, Xeon E3-1240, GTX 1050 Ti">
    <meta property="og:title" content="BlackCellUA — Твій ігровий портал">
    <meta property="og:image" content="https://img.youtube.com/vi/xC29GvadLBs/maxresdefault.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #ff4d00; /* Твій помаранчевий неон */
            --bg: #000000; /* ТІЛЬКИ ЧИСТИЙ ЧОРНИЙ */
        }
        
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Exo 2', sans-serif; 
        }

        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 30px; 
            border-bottom: 1px solid var(--neon); 
        }

        .logo { 
            font-family: 'Orbitron'; 
            color: var(--neon); 
            text-decoration: none; 
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 1fr 310px; 
            gap: 20px; 
            max-width: 1500px; 
            margin: 20px auto; 
            padding: 0 20px; 
        }

        /* Рамка плеєра точно як на Screenshot_8 */
        .main-frame {
            border: 2px solid var(--neon);
            border-radius: 10px;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .section-label {
            font-family: 'Orbitron';
            color: var(--neon);
            font-size: 0.9rem;
            margin: 25px 0 15px;
            text-transform: uppercase;
        }

        .video-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; 
        }

        .v-item { 
            border: 1px solid rgba(255, 77, 0, 0.2);
            border-radius: 8px;
            padding: 5px;
        }

        /* Блок Shorts справа як у макеті */
        .shorts-sidebar { display: flex; flex-direction: column; gap: 15px; }

        .short-card {
            border: 1px solid var(--neon);
            border-radius: 10px;
            padding: 10px;
            background: #000;
        }

        .short-video {
            width: 100%;
            aspect-ratio: 9/16;
            border-radius: 5px;
            overflow: hidden;
        }

        @media (max-width: 950px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">BLACKCELLUA</a>
    <div style="color:var(--neon); border:1px solid var(--neon); padding:3px 10px; border-radius:15px; font-size:0.7rem; font-family:'Orbitron';">LIVE FEED</div>
</nav>

<div class="main-layout">
    <main>
        <div class="main-frame">
            <iframe id="main-player" src="https://www.youtube.com/embed/xC29GvadLBs" allowfullscreen></iframe>
        </div>

        <div class="section-label">ОСТАННІ ТРАНСЛЯЦІЇ</div>
        <div class="video-list" id="feed">
            <div class="v-item">Оновлення...</div>
        </div>
    </main>

    <aside class="shorts-sidebar">
        <div class="short-card">
            <span style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem; display:block; margin-bottom:10px;">⚡ SHORTS #1</span>
            <div class="short-video">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs" allowfullscreen></iframe>
            </div>
        </div>
        <div class="short-card">
            <span style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem; display:block; margin-bottom:10px;">⚡ SHORTS #2</span>
            <div class="short-video">
                <iframe src="https://www.youtube.com/embed/wdS_GgBYDZQ" allowfullscreen></iframe>
            </div>
        </div>
    </aside>
</div>

<script>
    async function load() {
        const cid = 'UC29hev1ElIOHYG9oFm9dieQ';
        const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + cid)}`;
        try {
            const r = await fetch(url);
            const d = await r.json();
            if(d.status === 'ok') {
                const f = document.getElementById('feed');
                f.innerHTML = '';
                d.items.forEach(i => {
                    const id = i.link.split('v=')[1];
                    // БЕЗ АВТОЗАПУСКУ В СІТЦІ
                    f.innerHTML += `<div class="v-item"><iframe src="https://www.youtube.com/embed/${id}" style="aspect-ratio:16/9; border-radius:5px;"></iframe></div>`;
                });
            }
        } catch(e) {}
    }
    window.onload = load;
</script>
</body>
</html>
