<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми World of Tanks та NFS Українською</title>
    <meta name="description" content="Офіційний сайт BlackCellUA. Стріми WOT, NFS та гайди українською. Дивись наживо на Xeon E3-1240!">
    <meta name="keywords" content="BlackCellUA, стрім українською, WOT UA, NFS стрім, Xeon E3-1240, GTX 1050 Ti">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { --neon: #00ffcc; --red: #ff4444; --bg: #020617; --text: #ffffff; --glass: rgba(255, 255, 255, 0.05); }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #000; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        /* ВЕЛИКИЙ ПЛЕЄР (КІНОТЕАТР) */
        .hero-section { width: 100%; background: #000; border-bottom: 1px solid var(--neon); }
        .hero-container { width: 100%; max-width: 1920px; margin: 0 auto; aspect-ratio: 16/9; }
        .hero-container iframe { width: 100%; height: 100%; border: none; }

        /* ОСНОВНА СІТКА */
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; max-width: 1600px; margin: 30px auto; padding: 0 20px; flex-grow: 1; }
        
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* ВИПРАВЛЕНА СІТКА ВІДЕО */
        #popular-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: var(--glass); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .video-card:hover { border-color: var(--neon); transform: translateY(-3px); }
        .video-card iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; }
        .video-card p { margin-top: 10px; font-size: 0.85rem; font-weight: 600; line-height: 1.4; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* САЙДБАР */
        .sidebar-panel { background: var(--glass); border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .shorts-wrap { width: 100%; aspect-ratio: 9/16; border-radius: 10px; overflow: hidden; border: 1px solid var(--neon); position: relative; }
        .shorts-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        footer { background: #000; padding: 25px; text-align: center; border-top: 1px solid rgba(0, 255, 204, 0.2); margin-top: 50px; }
        .copy { font-family: 'Orbitron'; font-size: 0.8rem; color: rgba(255,255,255,0.5); }

        @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELLUA</a>
    <div style="color: var(--neon); font-family: 'Orbitron'; font-size: 0.8rem;">● СИСТЕМА ОНЛАЙН</div>
</nav>

<section class="hero-section">
    <div class="hero-container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" allowfullscreen></iframe>
    </div>
</section>

<div class="main-layout">
    <div class="content">
        <h2 class="section-title"><i class="fa-solid fa-play"></i> ОСТАННІ ВІДЕО ТА ГАЙДИ</h2>
        <div id="popular-grid">Завантаження контенту...</div>
    </div>

    <aside>
        <div class="sidebar-panel">
            <h3 class="section-title"><i class="fa-solid fa-bolt"></i> SHORTS</h3>
            <div class="shorts-wrap">
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUSH29hev1ElIOHYG9oFm9dieQ"></iframe>
            </div>
        </div>

        <div class="sidebar-panel">
            <h3 class="section-title"><i class="fa-solid fa-microchip"></i> ЗАЛІЗО</h3>
            <div style="font-size: 0.85rem; line-height: 1.8;">
                <div>CPU: Xeon E3-1240</div>
                <div>GPU: GTX 1050 Ti</div>
                <div>RAM: 16GB DDR3</div>
            </div>
        </div>

        <div class="sidebar-panel">
            <h3 class="section-title"><i class="fa-solid fa-link"></i> КОНТАКТИ</h3>
            <a href="https://t.me/blackcellua" target="_blank" style="color:var(--neon); text-decoration:none; display:block; margin-bottom:10px;"><i class="fa-brands fa-telegram"></i> Telegram</a>
        </div>
    </aside>
</div>

<footer>
    <div class="copy">© 2026 BLACKCELLUA. Стріми українською.</div>
</footer>

<script>
    const CID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function getVideos() {
        const grid = document.getElementById('popular-grid');
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CID)}`);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                grid.innerHTML = data.items.slice(0, 10).map(v => `
                    <div class="video-card">
                        <iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" loading="lazy"></iframe>
                        <p>${v.title}</p>
                    </div>
                `).join('');
            } else {
                throw new Error('API Error');
            }
        } catch (e) {
            // ФОЛБЕК: Якщо API лежить, показуємо плейлист у сітці
            grid.innerHTML = `
                <div class="video-card" style="grid-column: 1 / -1;">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=UUSH29hev1ElIOHYG9oFm9dieQ" style="height:450px;"></iframe>
                    <p style="text-align:center;">Останні відео (Плейлист)</p>
                </div>`;
        }
    }
    getVideos();
</script>

</body>
</html>
