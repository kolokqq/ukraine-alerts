<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми World of Tanks Українською</title>
    <meta name="description" content="Офіційний сайт стрімера BlackCellUA. Прямі трансляції WOT та Need for Speed. Найкращі моменти, Shorts та розіграші.">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks стрім, NFS Most Wanted, ігри українською, Xeon E3-1240, GTX 1050 Ti">
    <meta property="og:title" content="BlackCellUA - Gaming Portal">
    <meta property="og:description" content="Танкові баталії та перегони у прямому ефірі!">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --danger: #ff0055; --gold: #ffcc00; 
            --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03); --nav-bg: rgba(0, 0, 0, 0.8);
        }

        body.light-theme {
            --bg: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%); --text: #0f172a;
            --glass: rgba(15, 23, 42, 0.05); --nav-bg: rgba(255, 255, 255, 0.9);
        }

        body { margin: 0; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; transition: 0.4s ease; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .btn { padding: 8px 12px; border-radius: 5px; text-decoration: none; font-family: 'Orbitron'; font-size: 0.65rem; border: 1px solid var(--neon); color: var(--neon); background: transparent; cursor: pointer; }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .glass-panel { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); margin: 30px 0 15px 0; font-size: 1.2rem; }

        /* МОДУЛЬ 10: УВЕДОМЛЕННЯ */
        #notification-toast {
            position: fixed; bottom: 20px; left: 20px; background: var(--nav-bg); 
            border-left: 4px solid var(--neon); padding: 15px 25px; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2000; transform: translateX(-150%);
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #notification-toast.show { transform: translateX(0); }

        /* МОДУЛЬ 11: РЕПОСТИ */
        .share-row { display: flex; gap: 10px; margin-top: 10px; }
        .share-btn { flex: 1; padding: 8px; font-size: 0.7rem; border-radius: 5px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; transition: 0.3s; text-align: center; text-decoration: none; font-family: 'Orbitron'; }
        .share-btn:hover { background: var(--neon); color: #000; }

        /* МОДУЛЬ 15: ЛЕНТА RSS */
        .news-feed { max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .news-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; display: block; text-decoration: none; color: inherit; }
        .news-item:hover { background: rgba(255,255,255,0.03); }
        .news-date { font-size: 0.6rem; color: var(--neon); font-family: 'Orbitron'; }
        .news-item h5 { margin: 5px 0; font-size: 0.85rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: 1px solid #333; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="body">

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:var(--text)">UA</span></a>
    <div class="nav-links">
        <button class="btn" onclick="toggleLang()">🌐 <span id="lang-btn">EN</span></button>
        <button class="btn" onclick="toggleTheme()">🌓</button>
        <div id="online-count" style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem;">ОНЛАЙН: 12</div>
    </div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="glass-panel">
            <div id="main-video"></div>
        </div>

        <h2 class="section-title">🔥 ТОП ВІДЕО КАНАЛУ</h2>
        <div id="popular-grid" class="grid"></div>

        <h2 class="section-title">📰 ОСТАННІ ПОДІЇ</h2>
        <div class="glass-panel">
            <div id="rss-feed" class="news-feed">Завантаження новин...</div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel side-card">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; color: var(--gold); margin-bottom: 15px;">⚡ ТОП SHORTS</h3>
            <div id="shorts-container"></div>
        </div>

        <div class="glass-panel side-card" style="margin-top: 20px;">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon); margin-bottom: 15px;">📢 ПОДІЛИТИСЯ</h3>
            <div class="share-row">
                <a href="#" onclick="share('tg')" class="share-btn">TG</a>
                <a href="#" onclick="share('fb')" class="share-btn">FB</a>
                <a href="#" onclick="share('copy')" class="share-btn">LINK</a>
            </div>
        </div>
    </aside>
</div>

<div id="notification-toast">
    <div id="notify-title" style="font-family: 'Orbitron'; font-size: 0.7rem; color: var(--neon);">SYSTEM</div>
    <div id="notify-msg" style="font-size: 0.8rem; margin-top: 5px;">Ласкаво просимо на BlackCellUA!</div>
</div>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';
    let currentLang = 'uk';

    function toggleLang() {
        currentLang = currentLang === 'uk' ? 'en' : 'uk';
        document.getElementById('lang-btn').innerText = currentLang.toUpperCase();
        showNotify("Language changed / Мову змінено");
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); showNotify("Theme toggled"); }

    function showNotify(msg) {
        const toast = document.getElementById('notification-toast');
        document.getElementById('notify-msg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function share(platform) {
        const url = window.location.href;
        const text = "Дивись стріми BlackCellUA!";
        if(platform === 'tg') window.open(`https://t.me/share/url?url=${url}&text=${text}`);
        if(platform === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`);
        if(platform === 'copy') {
            navigator.clipboard.writeText(url);
            showNotify("Посилання скопійовано!");
        }
    }

    async function loadContent() {
        const RSS_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}`;
        try {
            const response = await fetch(RSS_URL);
            const data = await response.json();
            if (data.status === 'ok') {
                document.getElementById('popular-grid').innerHTML = data.items.slice(0, 4).map(v => `
                    <div><iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" frameborder="0" allowfullscreen></iframe></div>
                `).join('');
                
                document.getElementById('rss-feed').innerHTML = data.items.map(item => `
                    <a href="${item.link}" target="_blank" class="news-item">
                        <span class="news-date">${new Date(item.pubDate).toLocaleDateString()}</span>
                        <h5>${item.title}</h5>
                    </a>
                `).join('');

                document.getElementById('shorts-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${data.items[0].link.split('v=')[1]}" frameborder="0" allowfullscreen style="aspect-ratio: 9/16;"></iframe>`;
            }
        } catch (e) { showNotify("Content load error"); }
    }

    function init() {
        document.getElementById('main-video').innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${CHANNEL_ID}" frameborder="0" allowfullscreen></iframe>`;
        loadContent();
        setTimeout(() => showNotify("Сьогодні стрім о 19:00!"), 3000);
    }

    init();
</script>
</body>
</html>
