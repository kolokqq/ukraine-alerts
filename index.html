<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | World of Tanks</title>
    <meta name="description" content="Ігровий портал BlackCellUA 🔥. Дивись прямі трансляції WOT українською.">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks UA, WOT стрім, танки українською">
    <meta name="author" content="BlackCellUA">
    
    <link rel="canonical" href="https://blackcellua.pp.ua/">

    <meta property="og:url" content="https://blackcellua.pp.ua/">
    <meta property="og:title" content="BlackCellUA 🔥 — Твій ігровий портал">
    <meta property="og:description" content="Прямі ефіри World of Tanks та шлях до трьох позначок.">
    <meta property="og:image" content="https://i.ibb.co/3s6C7fG/image-3.png">
    <meta property="og:type" content="website">

    <link rel="shortcut icon" href="favicon_v2.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; 
            --bg: #020617; 
            --panel: rgba(255,255,255,0.03);
            --text: #ffffff; 
        }

        body.light-mode { 
            --bg: #f0f2f5; 
            --panel: #ffffff; 
            --text: #1a1a1a; 
            --neon: #008f7a;
        }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; background: rgba(0,0,0,0.9); 
            border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; 
        }
        
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.4); background: #000; }
        
        .live-status-tag { position: absolute; top: 15px; left: 15px; z-index: 10; padding: 5px 12px; border-radius: 5px; font-family: 'Orbitron'; font-size: 0.7rem; background: rgba(0,0,0,0.85); border: 1px solid var(--neon); color: var(--neon); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); }
        .is-live { border-color: #ff0000; color: #ff0000; }
        .is-live .dot { background: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        iframe { width: 100%; height: 100%; border: none; }
        
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 0.9rem; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .v-card { background: var(--panel); padding: 10px; border-radius: 12px; border: 1px solid rgba(0,255,204,0.1); }
        
        .glass-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        
        /* ДОНАТИ - ВИПРАВЛЕНИЙ ДИЗАЙН */
        .don-list { display: flex; flex-direction: column; gap: 10px; }
        .don-link { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            background: rgba(255,255,255,0.05); border-radius: 10px; 
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .don-link i { font-size: 1.2rem; width: 25px; text-align: center; color: var(--neon); }
        .don-info { display: flex; flex-direction: column; }
        .don-title { font-family: 'Orbitron'; font-size: 0.8rem; font-weight: bold; }
        .don-desc { font-size: 0.65rem; opacity: 0.7; }

        .don-link:hover { background: rgba(0, 255, 204, 0.1); border-color: var(--neon); transform: translateX(5px); }

        /* SHARE BUTTONS */
        .share-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .sh-btn { display: flex; flex-direction: column; align-items: center; padding: 10px 5px; border-radius: 8px; text-decoration: none; color: white; font-size: 0.65rem; transition: 0.3s; }
        .sh-tg { background: #229ED9; } .sh-wa { background: #25D366; } .sh-fb { background: #1877F2; }
        .sh-tw { background: #000; } .sh-cp { background: #444; }
        .sh-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .soc-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; text-decoration: none; color: white; font-size: 0.8rem; }
        .soc-btn:hover { background: var(--neon); color: #000; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">BlackCellUA 🔥</a>
    <div style="display:flex; gap:15px; align-items:center;">
        <span style="cursor:pointer;" onclick="document.body.classList.toggle('light-mode')">🌓</span>
        <div style="font-size:0.8rem; font-weight:bold;">UA US PL</div>
    </div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="live-indicator" class="live-status-tag">
                <div class="dot"></div><span id="status-text">ОФЛАЙН</span>
            </div>
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> ОСОБЛИВЕ ВІДЕО</h2>
        <div id="grid-special" class="grid-container">Завантаження...</div>

        <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> ОСТАННІ ТРАНСЛЯЦІЇ</h2>
        <div id="grid-recent" class="grid-container">Завантаження...</div>
    </div>

    <aside>
        <div class="glass-panel" style="text-align:center;">
            <div style="color:#00ff00; font-family:'Orbitron'; font-size:0.8rem;">
                <span style="display:inline-block; width:8px; height:8px; background:#00ff00; border-radius:50%; box-shadow:0 0 10px #00ff00;"></span>
                ЗАРАЗ НА САЙТІ: <span id="online-count">12</span>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-share-nodes"></i> РЕПОСТ</h3>
            <div class="share-grid">
                <a href="https://t.me/share/url?url=https://blackcellua.pp.ua/" target="_blank" class="sh-btn sh-tg"><i class="fa-brands fa-telegram"></i> TG</a>
                <a href="https://api.whatsapp.com/send?text=https://blackcellua.pp.ua/" target="_blank" class="sh-btn sh-wa"><i class="fa-brands fa-whatsapp"></i> WA</a>
                <a href="https://www.facebook.com/sharer/sharer.php?u=https://blackcellua.pp.ua/" target="_blank" class="sh-btn sh-fb"><i class="fa-brands fa-facebook"></i> FB</a>
                <a href="https://twitter.com/intent/tweet?url=https://blackcellua.pp.ua/" target="_blank" class="sh-btn sh-tw"><i class="fa-brands fa-x-twitter"></i> X</a>
                <a href="#" onclick="copyLink()" class="sh-btn sh-cp"><i class="fa-solid fa-link"></i> Link</a>
            </div>
        </div>

        <div class="glass-panel" style="border: 1px solid var(--neon);">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-wallet"></i> ПІДТРИМКА</h3>
            <div class="don-list">
                <a href="https://donatello.to/BlackCellUA" target="_blank" class="don-link">
                    <i class="fa-solid fa-heart"></i>
                    <div class="don-info">
                        <span class="don-title">DONATELLO</span>
                        <span class="don-desc">Підтримати стрім</span>
                    </div>
                </a>
                <div class="don-link" style="cursor:pointer;" onclick="copyCard('НОМЕР_КАРТИ_ПРИВАТ', 'Приват24')">
                    <i class="fa-solid fa-credit-card"></i>
                    <div class="don-info">
                        <span class="don-title">ПРИВАТ 24</span>
                        <span class="don-desc">Копіювати карту</span>
                    </div>
                </div>
                <div class="don-link" style="cursor:pointer;" onclick="copyCard('НОМЕР_КАРТИ_ПУМБ', 'ПУМБ')">
                    <i class="fa-solid fa-building-columns"></i>
                    <div class="don-info">
                        <span class="don-title">ПУМБ</span>
                        <span class="don-desc">Копіювати карту</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-users"></i> СПІЛЬНОТА</h3>
            <div class="social-grid">
                <a href="https://discord.gg/cdyRSHqD" class="soc-btn"><i class="fa-brands fa-discord"></i> Discord</a>
                <a href="https://www.youtube.com/@BlackCellUA" class="soc-btn"><i class="fa-brands fa-youtube"></i> YouTube</a>
            </div>
        </div>
    </aside>
</div>

<script>
    const rssSpecial = 'https://rss.app/feeds/h7valG7dUSvQGIAh.xml';
    const rssRecent = 'https://rss.app/feeds/2IWHE7GWK0ut65vc.xml';

    function copyLink() {
        navigator.clipboard.writeText('https://blackcellua.pp.ua/');
        alert('Посилання скопійовано!');
    }

    function copyCard(num, name) {
        navigator.clipboard.writeText(num);
        alert(name + ': Номер карти скопійовано!');
    }

    async function fetchFeed(url, elementId, limit) {
        const grid = document.getElementById(elementId);
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.status === 'ok') {
                let html = '';
                data.items.slice(0, limit).forEach(item => {
                    let vId = item.link.split('v=')[1]?.split('&')[0] || item.link.split('/').pop();
                    html += `
                    <div class="v-card">
                        <iframe src="https://www.youtube.com/embed/${vId}" style="width:100%; aspect-ratio:16/9; border-radius:8px;"></iframe>
                        <p style="font-size:0.7rem; margin-top:8px; text-align:center;">${item.title}</p>
                    </div>`;
                });
                grid.innerHTML = html;
                return data.items[0];
            }
        } catch (e) { grid.innerHTML = "Помилка завантаження."; }
    }

    async function updateAll() {
        const last = await fetchFeed(rssRecent, 'grid-recent', 6);
        await fetchFeed(rssSpecial, 'grid-special', 3);
        if (last) {
            const isLive = last.title.toLowerCase().includes('live') || last.title.toLowerCase().includes('стрім');
            document.getElementById('live-indicator').className = isLive ? 'live-status-tag is-live' : 'live-status-tag';
            document.getElementById('status-text').innerText = isLive ? 'LIVE' : 'ОФЛАЙН';
        }
    }

    window.onload = updateAll;
    setInterval(() => {
        document.getElementById('online-count').innerText = Math.floor(Math.random() * 15) + 5;
    }, 5000);
</script>
</body>
</html>
