<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | World of Tanks</title>
    <meta name="description" content="Ігровий портал BlackCellUA 🔥. Дивись прямі трансляції WOT українською.">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks UA, WOT стрім, танки українською">
    <meta name="author" content="BlackCellUA">
    
    <link rel="canonical" href="https://blackcellua.pp.ua/">

    <meta property="og:url" content="https://blackcellua.pp.ua/">
    <meta property="og:title" content="BlackCellUA 🔥 — Твій ігровий портал">
    <meta property="og:description" content="Прямі ефіри World of Tanks та шлях до трьох позначок.">
    <meta property="og:image" content="https://i.ibb.co/3s6C7fG/image-3.png">
    <meta property="og:type" content="website">

    <link rel="shortcut icon" href="favicon_v2.ico" type="image/x-icon">
    <link rel="icon" href="favicon_32_v2.png" sizes="32x32">
    <link rel="icon" href="favicon_48_v2.png" sizes="48x48">
    <link rel="icon" href="favicon_96_v2.png" sizes="96x96">
    <link rel="icon" href="favicon_144_v2.png" sizes="144x144">
    <link rel="apple-touch-icon" href="favicon_144_v2.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        :root { --neon: #00ffcc; --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); --text: #ffffff; }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.4); background: #000; margin-bottom: 20px; }
        
        .live-status-tag { position: absolute; top: 15px; left: 15px; z-index: 10; padding: 5px 12px; border-radius: 5px; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.85); border: 1px solid var(--neon); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); }
        .is-live { border-color: #ff0000; color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .is-live .dot { background: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        iframe { width: 100%; height: 100%; border: none; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1rem; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .v-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(0,255,204,0.1); }
        
        .glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(5px); }
        
        .goal-bar { background: rgba(255,255,255,0.1); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(0,255,204,0.2); }
        .goal-progress { background: var(--neon); height: 100%; width: 75%; box-shadow: 0 0 10px var(--neon); }
        
        .schedule-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .schedule-item span { color: var(--neon); font-weight: bold; }

        /* КОЛЬОРОВІ КНОПКИ СОЦМЕРЕЖ */
        .color-social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .c-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }
        .c-btn i { font-size: 1.1rem; }
        
        .btn-tg { background: #229ED9; box-shadow: 0 4px 10px rgba(34, 158, 217, 0.3); }
        .btn-dc { background: #5865F2; box-shadow: 0 4px 10px rgba(88, 101, 242, 0.3); }
        .btn-tt { background: #000000; border: 1px solid #ff0050; box-shadow: 0 4px 10px rgba(255, 0, 80, 0.2); }
        .btn-yt { background: #FF0000; box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3); }
        
        .c-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .btn-donate { display: block; width: 100%; padding: 12px; background: var(--neon); color: #000; text-align: center; text-decoration: none; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; transition: 0.3s; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        .btn-donate:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--neon); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="https://blackcellua.pp.ua" class="logo">BlackCellUA 🔥</a>
    <div style="color:var(--neon); font-family:'Orbitron'; font-size:0.6rem; border:1px solid var(--neon); padding:4px 20px; border-radius:20px;">LIVE SYSTEM</div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="live-indicator" class="live-status-tag">
                <div class="dot"></div><span id="status-text">ОФЛАЙН</span>
            </div>
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> ОСОБЛИВЕ ВІДЕО</h2>
        <div id="grid-special" class="grid-container">Завантаження...</div>

        <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> ОСТАННІ ТРАНСЛЯЦІЇ</h2>
        <div id="grid-recent" class="grid-container">Завантаження...</div>
    </div>

    <aside>
        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem; margin-top:0;"><i class="fa-solid fa-bolt"></i> TOP SHORTS</h3>
            <div style="width:100%; aspect-ratio:9/16; border-radius:12px; overflow:hidden; border:1px solid var(--neon);">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs" allowfullscreen></iframe>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem; margin-top:0;"><i class="fa-solid fa-bullseye"></i> ЦІЛЬ</h3>
            <div class="goal-bar"><div class="goal-progress" style="width: 75%;"></div></div>
            <p style="font-size:0.7rem; text-align:center; margin-top:5px; color:#aaa;">До 5,000 підписників!</p>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem; margin-top:0;"><i class="fa-solid fa-calendar-day"></i> ГРАФІК</h3>
            <div class="schedule-item">Пн - Пт: <span>19:00</span></div>
            <div class="schedule-item">Сб - Нд: <span>14:00</span></div>
        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem; margin-top:0;"><i class="fa-solid fa-share-nodes"></i> СПІЛЬНОТА</h3>
            <div class="color-social-grid">
                <a href="https://t.me/your_link" target="_blank" class="c-btn btn-tg"><i class="fa-brands fa-telegram"></i> TG</a>
                <a href="https://discord.gg/your_link" target="_blank" class="c-btn btn-dc"><i class="fa-brands fa-discord"></i> DIS</a>
                <a href="https://tiktok.com/@your_link" target="_blank" class="c-btn btn-tt"><i class="fa-brands fa-tiktok"></i> TIKTOK</a>
                <a href="https://youtube.com/@your_link" target="_blank" class="c-btn btn-yt"><i class="fa-brands fa-youtube"></i> SUB</a>
            </div>
        </div>

        <div class="glass-panel">
            <a href="https://skif.donatik.ua" target="_blank" class="btn-donate">ПІДТРИМАТИ</a>
        </div>
    </aside>
</div>

<script>
    const rssSpecial = 'https://rss.app/feeds/h7valG7dUSvQGIAh.xml';
    const rssRecent = 'https://rss.app/feeds/2IWHE7GWK0ut65vc.xml';

    async function fetchFeed(url, elementId, limit) {
        const grid = document.getElementById(elementId);
        const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${new Date().getTime()}`;
        
        try {
            const res = await fetch(api);
            const data = await res.json();
            if (data.status === 'ok') {
                let html = '';
                data.items.slice(0, limit).forEach(item => {
                    let vId = item.link.includes('v=') ? item.link.split('v=')[1]?.split('&')[0] : item.link.split('/').pop();
                    html += `
                    <div class="v-card">
                        <div style="position:relative; width:100%; aspect-ratio:16/9;">
                            <iframe src="https://www.youtube.com/embed/${vId}?rel=0" allowfullscreen style="width:100%; height:100%; border-radius:8px;"></iframe>
                        </div>
                        <p style="font-size:0.75rem; margin-top:10px; font-weight:600; color:var(--neon); text-align:center;">${item.title}</p>
                    </div>`;
                });
                grid.innerHTML = html;
                return data.items[0]; 
            }
        } catch (e) { grid.innerHTML = "Помилка."; }
    }

    async function updateAll() {
        const lastVideo = await fetchFeed(rssRecent, 'grid-recent', 6);
        await fetchFeed(rssSpecial, 'grid-special', 3);

        if (lastVideo) {
            const isLive = lastVideo.title.toLowerCase().includes('live') || lastVideo.title.toLowerCase().includes('стрім');
            document.getElementById('live-indicator').className = isLive ? 'live-status-tag is-live' : 'live-status-tag';
            document.getElementById('status-text').innerText = isLive ? 'LIVE' : 'ОФЛАЙН';
        }
    }

    window.onload = () => {
        updateAll();
        setInterval(updateAll, 180000);
    };
</script>
</body>
</html>
