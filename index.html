<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackCellUA | Стріми та Відео</title>
    
    <meta name="description" content="Офіційний сайт BlackCellUA. Стріми World of Tanks та NFS українською.">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        :root { --neon: #00ffcc; --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); --text: #ffffff; }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }

        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.4); background: #000; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        iframe { width: 100%; height: 100%; border: none; }

        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin: 30px 0 20px; display: flex; align-items: center; gap: 10px; }

        /* СІТКА ВІДЕО З RSS */
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; min-height: 200px; }
        .v-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(0,255,204,0.1); transition: 0.3s; }
        .v-card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,255,204,0.1); }

        .glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .btn-donate { display: block; width: 100%; padding: 12px; background: var(--neon); color: #000; text-align: center; text-decoration: none; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .btn-donate:hover { box-shadow: 0 0 15px var(--neon); }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
    <div style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem; border:1px solid var(--neon); padding:5px 12px; border-radius:20px;">SYSTEM: ACTIVE</div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" allowfullscreen></iframe>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> ОСТАННІ ВІДЕО ТА ГАЙДИ</h2>
        <div id="video-grid">
            <p style="text-align:center; color:var(--neon); width:100%; grid-column:1/-1;">Завантаження стрічки відео...</p>
        </div>
    </div>

    <aside>
        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.9rem;"><i class="fa-solid fa-bolt"></i> SHORTS</h3>
            <div style="width:100%; aspect-ratio:9/16; border-radius:12px; overflow:hidden; border:2px solid var(--neon);">
                <iframe src="https://www.youtube.com/embed/videoseries?list=UUSH29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
            </div>
        </div>
        
        <div class="glass-panel">
            <h3 class="section-title" style="font-size: 0.8rem;"><i class="fa-solid fa-microchip"></i> SETUP</h3>
            <p style="font-size:0.8rem; margin:5px 0;">Xeon E3-1240 | GTX 1050 Ti</p>
            <p style="font-size:0.8rem; margin:5px 0; color:var(--neon);">NVENC Encoder</p>
        </div>

        <div class="glass-panel">
            <a href="https://skif.donatik.ua" target="_blank" class="btn-donate">ПІДТРИМАТИ</a>
        </div>
    </aside>
</div>

<script>
    async function loadContent() {
        const grid = document.getElementById('video-grid');
        // Твоє посилання на RSS
        const rssUrl = "https://rss.diffbot.com/rss?url=https://social-up.pp.ua";
        const proxy = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;

        try {
            const res = await fetch(proxy);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                grid.innerHTML = data.items.map(item => {
                    // Проста перевірка на ID відео
                    const id = item.link.includes('v=') ? item.link.split('v=')[1] : item.guid.split('/').pop();
                    return `
                        <div class="v-card">
                            <iframe src="https://www.youtube.com/embed/${id}" loading="lazy" allowfullscreen style="width:100%; aspect-ratio:16/9; border-radius:8px;"></iframe>
                            <p style="font-size:0.75rem; margin-top:10px; height:32px; overflow:hidden; font-weight:bold;">${item.title}</p>
                        </div>`;
                }).join('');
            } else {
                throw new Error("RSS empty");
            }
        } catch (e) {
            // БЕКАП: Якщо RSS не бачить відео, ставимо надійний плейлист
            grid.innerHTML = `<div style="grid-column:1/-1; height:500px; width:100%; border-radius:15px; overflow:hidden;">
                <iframe src="https://www.youtube.com/embed/videoseries?list=UULP29hev1ElIOHYG9oFm9dieQ" allowfullscreen></iframe>
            </div>`;
        }
    }
    window.onload = loadContent;
</script>

</body>
</html>
