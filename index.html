<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | World of Tanks та NFS Українською</title>
    <meta name="description" content="Офіційний сайт BlackCellUA - https://social-up.pp.ua. Стріми та гайди українською.">
    <meta name="keywords" content="BlackCellUA, стрім українською, WOT UA, NFS, Xeon E3-1240, GTX 1050 Ti">
    <meta name="author" content="BlackCellUA">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { --neon: #00ffcc; --red: #ff4444; --bg: #020617; --text: #ffffff; }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #000; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.7rem; border: 1px solid var(--neon); color: var(--neon); text-transform: uppercase; }

        /* ГОЛОВНИЙ ПЛЕЄР - ФІКСОВАНА ВИСОТА */
        .hero-player { width: 100%; background: #000; border-bottom: 1px solid rgba(0, 255, 204, 0.3); }
        .player-inner { width: 100%; max-width: 1400px; margin: 0 auto; aspect-ratio: 16/9; }
        .player-inner iframe { width: 100%; height: 100%; border: none; }

        /* СІТКА КОНТЕНТУ */
        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; max-width: 1400px; margin: 25px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        
        .title { font-family: 'Orbitron'; color: var(--neon); font-size: 1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }

        #popular-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .v-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .v-card:hover { border-color: var(--neon); transform: translateY(-3px); }
        .v-card iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; margin-bottom: 10px; }
        .v-card p { font-size: 0.85rem; margin: 0; line-height: 1.4; color: #fff; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* САЙДБАР */
        .glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .shorts-box { width: 100%; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; border: 1px solid var(--neon); }

        footer { background: #000; padding: 20px; text-align: center; border-top: 1px solid rgba(0, 255, 204, 0.1); margin-top: auto; font-size: 0.75rem; color: rgba(255,255,255,0.4); font-family: 'Orbitron'; }

        @media (max-width: 950px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELLUA</a>
    <div id="status" class="status-badge">Система онлайн</div>
</nav>

<section class="hero-player">
    <div class="player-inner">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UC29hev1ElIOHYG9oFm9dieQ&autoplay=1&mute=1" allowfullscreen></iframe>
    </div>
</section>

<div class="layout">
    <div class="main-content">
        <h2 class="title"><i class="fa-solid fa-video"></i> Останні відео та гайди</h2>
        <div id="popular-grid">Завантаження контенту...</div>
    </div>

    <aside>
        <div class="glass-panel">
            <h3 class="title" style="font-size: 0.9rem;"><i class="fa-solid fa-bolt"></i> Shorts</h3>
            <div class="shorts-box">
                <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUSH29hev1ElIOHYG9oFm9dieQ"></iframe>
            </div>
        </div>
        
        <div class="glass-panel">
            <h3 class="title" style="font-size: 0.9rem;"><i class="fa-solid fa-microchip"></i> Залізо</h3>
            <div style="font-size: 0.8rem; line-height: 1.6; opacity: 0.7;">
                Xeon E3-1240<br>GTX 1050 Ti<br>16GB DDR3
            </div>
        </div>
    </aside>
</div>

<footer>
    © 2026 BLACKCELLUA. ВСІ ПРАВА ЗАХИЩЕНІ.
</footer>

<script>
    const CID = 'UC29hev1ElIOHYG9oFm9dieQ';

    async function loadVideos() {
        const grid = document.getElementById('popular-grid');
        try {
            // Використовуємо RSS2JSON для отримання окремих відео
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CID)}`);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                grid.innerHTML = data.items.slice(0, 10).map(v => `
                    <div class="v-card">
                        <iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" loading="lazy"></iframe>
                        <p>${v.title}</p>
                    </div>
                `).join('');
            } else {
                throw new Error('Fallback');
            }
        } catch (e) {
            // Якщо не вдалося завантажити окремі відео, ставимо плейлист як аварійний варіант
            grid.innerHTML = `
                <div style="grid-column: 1/-1; height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--neon);">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=UUSH29hev1ElIOHYG9oFm9dieQ"></iframe>
                </div>`;
        }
    }

    loadVideos();
</script>

</body>
</html>
