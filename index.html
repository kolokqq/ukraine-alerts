<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BlackCellUA | Стріми World of Tanks Українською</title>
    <meta name="description" content="Офіційний сайт стрімера BlackCellUA. Прямі трансляції WOT та Need for Speed. Найкращі моменти, Shorts та розіграші.">
    <meta name="keywords" content="BlackCellUA, стрім українською, World of Tanks стрім, NFS Most Wanted, ігри українською, Xeon E3-1240, GTX 1050 Ti">
    <meta property="og:title" content="BlackCellUA - Gaming Portal">
    <meta property="og:description" content="Танкові баталії та перегони у прямому ефірі!">
    
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --danger: #ff0055; --gold: #ffcc00; --online: #00ff66;
            --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03); --nav-bg: rgba(0, 0, 0, 0.8);
        }

        body.light-theme {
            --bg: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%); --text: #0f172a;
            --glass: rgba(15, 23, 42, 0.05); --nav-bg: rgba(255, 255, 255, 0.9);
        }

        body { margin: 0; background: var(--bg); background-attachment: fixed; color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; transition: 0.4s ease; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; gap: 12px; align-items: center; }
        .btn { padding: 8px 12px; border-radius: 5px; text-decoration: none; font-family: 'Orbitron'; font-size: 0.65rem; border: 1px solid var(--neon); color: var(--neon); background: transparent; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        
        /* МОДУЛЬ 29: ОПТИМІЗОВАНИЙ ПЛЕЄР */
        .player-viewport { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15); 
            border: 1px solid rgba(0, 255, 204, 0.2); 
        }
        .player-viewport iframe { width: 100%; height: 100%; border: none; }

        /* МОДУЛЬ 28: СТАТУС СТРІМА */
        .status-badge { 
            position: absolute; top: 15px; left: 15px; 
            padding: 5px 12px; border-radius: 4px; 
            font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; 
            z-index: 10; pointer-events: none; text-transform: uppercase;
        }
        .status-live { background: var(--danger); color: white; animation: blink-red 1.5s infinite; }
        .status-waiting { background: var(--online); color: #000; animation: blink-green 2s infinite; }

        @keyframes blink-red { 0% { opacity: 1; box-shadow: 0 0 5px var(--danger); } 50% { opacity: 0.6; box-shadow: 0 0 15px var(--danger); } 100% { opacity: 1; } }
        @keyframes blink-green { 0% { opacity: 1; box-shadow: 0 0 5px var(--online); } 50% { opacity: 0.5; box-shadow: 0 0 15px var(--online); } 100% { opacity: 1; } }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; backdrop-filter: blur(5px); }
        .section-title { font-family: 'Orbitron'; color: var(--neon); margin: 30px 0 15px 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .social-link { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; text-decoration: none; color: var(--text); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .social-link i { font-size: 1.5rem; margin-bottom: 5px; color: var(--neon); }
        .social-link:hover { background: rgba(0, 255, 204, 0.1); border-color: var(--neon); transform: translateY(-3px); }

        #notification-toast { position: fixed; bottom: 20px; left: 20px; background: var(--nav-bg); border-left: 4px solid var(--neon); padding: 15px 25px; border-radius: 8px; z-index: 2000; transform: translateX(-150%); transition: 0.5s; }
        #notification-toast.show { transform: translateX(0); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .video-card iframe { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: 1px solid #333; }
        
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="body">

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:var(--text)">UA</span></a>
    <div class="nav-links">
        <button class="btn" onclick="toggleLang()"><i class="fa-solid fa-globe"></i> <span id="lang-btn">EN</span></button>
        <button class="btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
        <div id="online-count" style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem;"><i class="fa-solid fa-eye"></i> 12</div>
    </div>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="stream-status" class="status-badge status-waiting">Очікування</div>
            <div id="main-video"></div>
        </div>

        <h2 class="section-title"><i class="fa-solid fa-fire"></i> ТОП ВІДЕО КАНАЛУ</h2>
        <div id="popular-grid" class="grid"></div>

        <h2 class="section-title"><i class="fa-solid fa-newspaper"></i> ОСТАННІ ПОДІЇ</h2>
        <div class="glass-panel">
            <div id="rss-feed" style="max-height: 300px; overflow-y: auto;">Завантаження...</div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 style="font-family:'Orbitron'; font-size:0.8rem; color:var(--neon); margin-bottom:15px;">🔗 СОЦМЕРЕЖІ</h3>
            <div class="social-grid">
                <a href="https://t.me/blackcellua" target="_blank" class="social-link"><i class="fa-brands fa-telegram"></i><span>TG</span></a>
                <a href="https://www.youtube.com/@BlackCellUA" target="_blank" class="social-link"><i class="fa-brands fa-youtube"></i><span>YT</span></a>
                <a href="#" class="social-link"><i class="fa-brands fa-discord"></i><span>DS</span></a>
            </div>
            
            <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                <p style="font-size:0.6rem; font-family:'Orbitron'; color:var(--gold);">SHARE:</p>
                <div style="display:flex; gap:8px;">
                    <button onclick="share('tg')" class="btn" style="padding:5px 10px;"><i class="fa-brands fa-telegram"></i></button>
                    <button onclick="share('copy')" class="btn" style="padding:5px 10px;"><i class="fa-solid fa-link"></i></button>
                </div>
            </div>
        </div>

        <div class="glass-panel" style="margin-top:20px;">
            <h3 style="font-family:'Orbitron'; font-size:0.8rem; color:var(--gold); margin-bottom:15px;">⚡ ТОП SHORTS</h3>
            <div id="shorts-container"></div>
        </div>
    </aside>
</div>

<div id="notification-toast">
    <div id="notify-title" style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon);">SYSTEM</div>
    <div id="notify-msg" style="font-size:0.8rem; margin-top:5px;"></div>
</div>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';
    let isLive = false;

    function showNotify(msg) {
        const toast = document.getElementById('notification-toast');
        document.getElementById('notify-msg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); showNotify("Тему змінено"); }

    async function checkStreamStatus() {
        // Перевірка чи йде стрім (логіка на основі RSS або API)
        // Для демонстрації змінюємо статус через 5 секунд після завантаження
        setTimeout(() => {
            const badge = document.getElementById('stream-status');
            badge.innerText = "В ЕФІРІ";
            badge.classList.remove('status-waiting');
            badge.classList.add('status-live');
            showNotify("BlackCellUA в ефірі! Приєднуйся!");
        }, 8000);
    }

    async function loadContent() {
        const RSS_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}`;
        try {
            const response = await fetch(RSS_URL);
            const data = await response.json();
            if (data.status === 'ok') {
                const items = data.items;
                document.getElementById('popular-grid').innerHTML = items.slice(0, 4).map(v => `
                    <div class="video-card"><iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" loading="lazy"></iframe></div>
                `).join('');
                
                document.getElementById('rss-feed').innerHTML = items.map(item => `
                    <a href="${item.link}" target="_blank" style="display:block; padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); text-decoration:none; color:inherit;">
                        <span style="font-size:0.6rem; color:var(--neon);">${new Date(item.pubDate).toLocaleDateString()}</span>
                        <h5 style="margin:5px 0; font-size:0.8rem;">${item.title}</h5>
                    </a>
                `).join('');

                document.getElementById('shorts-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${items[0].link.split('v=')[1]}" style="aspect-ratio:9/16;" loading="lazy"></iframe>`;
            }
        } catch (e) { console.error("RSS Error"); }
    }

    function init() {
        document.getElementById('main-video').innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${CHANNEL_ID}" allowfullscreen></iframe>`;
        loadContent();
        checkStreamStatus();
    }

    function share(p) {
        if(p==='copy') { navigator.clipboard.writeText(window.location.href); showNotify("Скопійовано!"); }
        else window.open(`https://t.me/share/url?url=${window.location.href}`);
    }

    init();
</script>
</body>
</html>
