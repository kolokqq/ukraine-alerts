        .section-title {

            gap: 10px;
            text-shadow: 0 0 10px rgba(255, 77, 0, 0.3);

        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }

        .v-card {

<script>
    // Анімація попелу
    function createAsh() {
        const container = document.getElementById('ash-particles');
        const particle = document.createElement('div');
        const size = Math.random() * 3 + 'px';
        particle.style.position = 'absolute';
        particle.style.background = 'rgba(255, 255, 255, 0.4)';
        particle.style.width = size; particle.style.height = size;
        particle.style.left = Math.random() * 100 + 'vw';
        particle.style.top = '-10px'; particle.style.borderRadius = '50%';
        particle.style.opacity = Math.random(); particle.style.filter = 'blur(1px)';
        container.appendChild(particle);
        const animation = particle.animate([
            { transform: `translate(0, 0)`, opacity: 0.8 },
            { transform: `translate(${Math.random() * 60 - 30}px, 100vh)`, opacity: 0 }
        ], { duration: Math.random() * 3000 + 5000, easing: 'linear' });
        animation.onfinish = () => particle.remove();
    }
    setInterval(createAsh, 150);

    // Завантаження YouTube RSS
    async function loadYouTubeData() {
        const grid = document.getElementById('video-grid');
        const mainPlayer = document.getElementById('main-player');
        const channelId = 'UC29hev1ElIOHYG9oFm9dieQ';
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
        const apiFetch = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${new Date().getTime()}`;

        try {
            const response = await fetch(apiFetch);
            const data = await response.json();
            if (data.status === 'ok' && data.items.length > 0) {
                const latestId = data.items[0].link.split('v=')[1].split('&')[0];
                mainPlayer.src = `https://www.youtube.com/embed/${latestId}?autoplay=1&mute=1`;
                let html = '';
                data.items.forEach(item => {
                    let videoId = item.link.split('v=')[1]?.split('&')[0] || item.guid.split(':').pop();
                    if (videoId) {
                        html += `<div class="v-card">
                            <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen style="width:100%; aspect-ratio:16/9; border-radius:8px;"></iframe>
                            <p style="font-size:0.75rem; margin-top:10px; font-weight:bold; color:#fff;">${item.title}</p>
                        </div>`;
