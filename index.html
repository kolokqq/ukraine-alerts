    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; 
            --bg: #020617; 
            --panel: rgba(255,255,255,0.03);
            --text: #ffffff; 
            --radius-lg: 20px; 
            --radius-sm: 12px;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0,0,0,0.95); 
            border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; 
        }
        
        .logo { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 15px var(--neon); }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        
        .player-viewport { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: var(--radius-lg); overflow: hidden; 
            border: 2px solid rgba(0, 255, 204, 0.3); background: #000;
        }
        
        .live-status-tag { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            padding: 6px 15px; border-radius: 30px; font-family: 'Orbitron'; 
            font-size: 0.7rem; background: rgba(0,0,0,0.8); 
            border: 1px solid var(--neon); color: var(--neon); 
            display: flex; align-items: center; gap: 8px; 
        }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); }
        .is-live { border-color: #ff0000; color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .is-live .dot { background: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .section-title { 
            font-family: 'Orbitron'; color: var(--neon); font-size: 0.9rem; 
            margin: 30px 0 20px; display: flex; align-items: center; gap: 12px; 
            text-transform: uppercase;
        }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .v-card { 
            background: var(--panel); padding: 12px; 
            border-radius: var(--radius-lg); 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s;
        }
        .v-card:hover { transform: translateY(-5px); border-color: var(--neon); }

        .v-title-box { 
            background: rgba(0, 255, 204, 0.07); 
            padding: 10px 15px; 
            border-radius: 8px; 
            border-left: 4px solid var(--neon); 
            font-size: 0.75rem; 
            margin-top: 10px;
            line-height: 1.4;
            font-weight: 600;
        }
        
        .glass-panel { 
            background: var(--panel); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: var(--radius-lg); 
            padding: 20px; margin-bottom: 20px; 
        }

        .don-link { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            background: rgba(255,255,255,0.03); border-radius: var(--radius-sm);
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s; margin-bottom: 10px;
        }
        .don-link:hover { background: rgba(0, 255, 204, 0.1); border-color: var(--neon); }

        .progress-track { background: rgba(255,255,255,0.1); height: 10px; border-radius: 20px; overflow: hidden; margin-top: 8px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #008f7a, var(--neon)); box-shadow: 0 0 10px var(--neon); transition: width 1.5s ease-in-out; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav><a href="/" class="logo">BLACKCELLUA 🔥</a></nav>

<div class="main-layout">
    <div class="content">

    <aside>
        <div class="glass-panel" style="text-align:center; border: 1px solid #00ff0055;">
            <div style="color:#00ff00; font-family:'Orbitron'; font-size:0.8rem;">
                <span style="display:inline-block; width:10px; height:10px; background:#00ff00; border-radius:50%; margin-right:8px; box-shadow:0 0 10px #00ff00;"></span>

        </div>

        <div class="glass-panel">
            <h3 class="section-title" style="margin-top:0;"><i class="fa-solid fa-crosshairs"></i> ЦІЛЬ: 3 ВІДМІТКИ</h3>
            <div style="margin-bottom: 15px;">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem;"><span>Об'єкт 277</span><b>92.4%</b></div>

<script>
    const APP_ID = 'b005714c276bf5c1a7ac6e313d6e4b7c'; // Твій ID з Screenshot_9

    async function fetchFeed(url, elementId, limit) {
        const grid = document.getElementById(elementId);
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.status === 'ok') {
                let html = '';
                data.items.slice(0, limit).forEach(item => {
                    let vId = item.link.split('v=')[1]?.split('&')[0] || item.link.split('/').pop();
                    html += `
                    <div class="v-card">
                        <iframe src="https://www.youtube.com/embed/${vId}" style="width:100%; aspect-ratio:16/9; border-radius:12px; border:none;"></iframe>
                        <div class="v-title-box">${item.title}</div>
                    </div>`;
                });
                grid.innerHTML = html;
                return data.items[0];
            }
        } catch (e) { grid.innerHTML = "Помилка завантаження..."; }
    }

    async function init() {
        const last = await fetchFeed('https://rss.app/feeds/2IWHE7GWK0ut65vc.xml', 'grid-recent', 6);
        await fetchFeed('https://rss.app/feeds/h7valG7dUSvQGIAh.xml', 'grid-special', 3);
        
        if (last) {
            const isLive = last.title.toLowerCase().includes('live') || last.title.toLowerCase().includes('стрім');
            document.getElementById('live-indicator').className = isLive ? 'live-status-tag is-live' : 'live-status-tag';
            document.getElementById('status-text').innerText = isLive ? 'LIVE' : 'ОФЛАЙН';
        }
    }

    window.onload = init;
    setInterval(() => { document.getElementById('online-count').innerText = Math.floor(Math.random() * 5) + 12; }, 5000);
</script>
