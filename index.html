    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; 
            --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --panel: rgba(255,255,255,0.03);
            --text: #ffffff; 
        }

        body.light-mode { 
            --bg: #f0f2f5; 
            --panel: #ffffff; 
            --text: #1a1a1a; 
            --neon: #008f7a;
        }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; transition: 0.3s; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; background: rgba(0,0,0,0.9); 
            border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; 
        }
        
        .nav-tools { display: flex; align-items: center; gap: 15px; }
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        .lang-container { display: flex; gap: 8px; }
        .lang-btn { cursor: pointer; font-size: 1.2rem; filter: grayscale(1); transition: 0.3s; opacity: 0.6; }
        .lang-btn.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); }
        .lang-btn:hover { opacity: 1; filter: grayscale(0.5); }

        .theme-toggle { cursor: pointer; color: var(--neon); font-size: 1.2rem; }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .player-viewport { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid rgba(0, 255, 204, 0.4); background: #000; margin-bottom: 20px; }
        
        .live-status-tag { position: absolute; top: 15px; left: 15px; z-index: 10; padding: 5px 12px; border-radius: 5px; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.85); border: 1px solid var(--neon); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); }
        .is-live { border-color: #ff0000; color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .is-live .dot { background: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        iframe { width: 100%; height: 100%; border: none; }
        .section-title { font-family: 'Orbitron'; color: var(--neon); font-size: 1rem; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .v-card { background: var(--panel); padding: 10px; border-radius: 12px; border: 1px solid rgba(0,255,204,0.1); }
        
        .glass-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(5px); }
        
        .online-box { display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Orbitron'; font-size: 0.8rem; color: #00ff00; margin-bottom: 10px; }
        .online-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 8px #00ff00; }

        .goal-bar { background: rgba(255,255,255,0.1); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(0,255,204,0.2); }
        .goal-progress { background: var(--neon); height: 100%; width: 75%; box-shadow: 0 0 10px var(--neon); }
        
        .schedule-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .schedule-item span { color: var(--neon); font-weight: bold; }

        .social-grid-v2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .s-btn { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; text-decoration: none; color: white; font-size: 0.75rem; transition: 0.3s; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        
        .s-tg:hover { background: #229ED9; }
        .s-dc:hover { background: #5865F2; }
        .s-tt:hover { background: #000000; border-color: #ff0050; }
        .s-yt:hover { background: #FF0000; }

        .share-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .share-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 2px; border-radius: 6px; text-decoration: none; color: white; font-size: 0.6rem; font-weight: bold; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .share-btn i { font-size: 1.1rem; margin-bottom: 3px; }
        .sh-tg { background: #229ED9; } .sh-vb { background: #7360f2; } .sh-wa { background: #25D366; }
        .sh-fb { background: #1877F2; } .sh-tw { background: #1DA1F2; } .sh-cp { background: #444; }
        .share-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* NEW DONATION STYLES */
        .donation-container { display: flex; flex-direction: column; gap: 8px; }
        .don-item { 
            display: flex; align-items: center; gap: 10px; padding: 12px; 
            border-radius: 10px; text-decoration: none; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02);
            cursor: pointer;
        }
        .don-item i { font-size: 1.2rem; width: 25px; text-align: center; }
        .don-info { display: flex; flex-direction: column; }
        .don-name { font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; color: #fff; }
        .don-sub { font-size: 0.6rem; color: var(--neon); }

        .d-donatello:hover { background: #6347ff; border-color: #fff; }
        .d-privat:hover { background: #70b33e; border-color: #fff; }
        .d-pumb:hover { background: #f44336; border-color: #fff; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
