<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackCellUA | Gaming Portal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');
        
        :root { 
            --neon: #00ffcc; --danger: #ff0055; --gold: #ffcc00;
            --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --text: #ffffff; --glass: rgba(255, 255, 255, 0.03);
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }
        
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }

        /* КОНТЕЙНЕР ПЛЕЄРА */
        .player-viewport { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: 15px; overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15); 
            border: 1px solid rgba(0, 255, 204, 0.2);
            background: #000;
        }

        /* ТВОЯ КАРТИНКА OFFLINE ЯК ЗАГЛУШКА */
        .player-placeholder {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; /* ПОВНІСТЮ ЗАКРИВАЄ ЮТУБ */
            text-align: center;
            /* ВИКОРИСТОВУЄМО ТВОЮ КАРТИНКУ ЯК ФОН */
            background: #020617 url('https://social-up.pp.ua/banner-offline.jpg') center/cover no-repeat;
            cursor: pointer; transition: 0.5s ease;
        }
        
        .player-placeholder:hover { filter: brightness(1.2); }
        
        /* КНОПКА ПЕРЕВІРКИ ПОВЕРХ КАРТИНКИ */
        .play-btn {
            background: rgba(0, 255, 204, 0.2);
            border: 2px solid var(--neon);
            color: var(--neon);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px var(--neon);
            margin-top: 120px; /* Опускаємо кнопку під текст на картинці */
        }

        #main-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #main-video iframe { width: 100%; height: 100%; border: none; }

        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; backdrop-filter: blur(5px); }
        .shorts-wrapper { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid var(--neon); }
        .shorts-wrapper iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">BLACKCELL<span style="color:#fff">UA</span></a>
</nav>

<div class="main-layout">
    <div class="content">
        <div class="player-viewport">
            <div id="main-video"></div>

            <div class="player-placeholder" id="placeholder" onclick="startStream()">
                <div class="play-btn"><i class="fa-solid fa-play"></i> ПЕРЕВІРИТИ ЕФІР</div>
            </div>
        </div>

        <h2 style="font-family:'Orbitron'; color:var(--neon); font-size:1.1rem; margin:25px 0 15px;">⚡ ОСТАННІ ВІДЕО</h2>
        <div id="popular-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:15px;"></div>
    </div>

    <aside class="sidebar">
        <div class="glass-panel">
            <h3 style="font-family:'Orbitron'; font-size:0.8rem; color:var(--gold); margin-bottom:15px;">⚡ ТОП SHORTS</h3>
            <div class="shorts-wrapper">
                <iframe src="https://www.youtube.com/embed/xC29GvadLBs?modestbranding=1" allowfullscreen></iframe>
            </div>
        </div>
    </aside>
</div>

<script>
    const CHANNEL_ID = 'UC29hev1ElIOHYG9oFm9dieQ';

    function startStream() {
        // При кліку видаляємо картинку і вантажимо стрім
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('main-video').innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${CHANNEL_ID}&autoplay=1" allowfullscreen></iframe>`;
    }

    async function loadVideos() {
        const RSS = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID)}`;
        try {
            const res = await fetch(RSS);
            const data = await res.json();
            if (data.status === 'ok') {
                document.getElementById('popular-grid').innerHTML = data.items.slice(0, 4).map(v => `
                    <div style="background:var(--glass); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);">
                        <iframe src="https://www.youtube.com/embed/${v.link.split('v=')[1]}" style="width:100%; aspect-ratio:16/9; border:none; border-radius:5px;" loading="lazy"></iframe>
                    </div>
                `).join('');
            }
        } catch (e) {}
    }

    window.onload = loadVideos;
</script>
</body>
</html>
