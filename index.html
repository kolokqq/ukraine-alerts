    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap'); 
        
        :root { 
            --neon: #00ffcc; 
            --bg: #020617; 
            --panel-bg: rgba(2, 6, 23, 0.8);
            --text: #ffffff; 
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }

        nav { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px 5%; 
            background: transparent; 
            border-bottom: 1px solid rgba(0, 255, 204, 0.3); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(5px);
        }
        .nav-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .action-btn { 
            display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; 
            text-decoration: none; color: white; font-family: 'Orbitron'; font-size: 0.8rem; 
            font-weight: bold; transition: 0.3s; border: none;
        }
        .btn-sub { background: #ff0000; }
        .btn-like { background: #3b82f6; }
        .btn-comm { background: #10b981; }
        .action-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .wrapper { display: flex; flex-direction: row; max-width: 1500px; margin: 20px auto; padding: 0 20px; gap: 30px; }
        .main-content { flex: 1; min-width: 0; }
        .sidebar { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }

        .player-box { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; border: 1px solid var(--neon); background: #000; }
        .section-header { font-family: 'Orbitron'; color: var(--neon); font-size: 0.9rem; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(13, 17, 23, 0.6); padding: 15px; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.2); }
        .card iframe { width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: none; }
        .title-tag { background: rgba(0, 255, 204, 0.05); padding: 10px; border-radius: 8px; border-left: 3px solid var(--neon); font-size: 0.8rem; margin-top: 12px; }

        .side-block {
            border: 1px solid var(--neon);
            border-radius: 25px;
            padding: 20px;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .side-title {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: var(--neon);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .inner-container {
            background: transparent;
            width: 100%;
            border-radius: 15px;
            padding: 10px 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 60px;
            justify-content: center;
            overflow: visible;
        }

        .online-number { font-family: 'Orbitron'; font-size: 2.5rem; color: #fff; text-align: center; }
        .server-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; font-weight: 600; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot-red { background-color: #ff0000; box-shadow: 0 0 5px #ff0000; }
        .status-online { color: #00ff00; font-family: 'Orbitron'; font-size: 0.75rem; }

        .shorts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; width: 100%; }
        .short-item { aspect-ratio: 9/16; background:#000; border-radius:15px; overflow:hidden; border: 1px solid rgba(255,255,255,0.1); }

        .btn-action-side {
            display: flex; align-items: center; justify-content: center; width: 100%; 
            padding: 12px; border-radius: 12px; text-decoration: none; font-family: 'Orbitron'; 
            font-size: 0.8rem; font-weight: bold; transition: 0.3s; margin-top: 10px;
            box-sizing: border-box;
        }
        .btn-yellow { background: #ffcc00; color: #000; }
        .btn-outline { border: 1px solid var(--neon); color: var(--neon); }
